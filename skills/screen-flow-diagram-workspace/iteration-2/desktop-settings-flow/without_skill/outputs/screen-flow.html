<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings Flow - Screen Flow Diagram</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #F7F8FA;
    overflow: auto;
  }
  .page-header {
    padding: 32px 48px 16px;
    background: #fff;
    border-bottom: 1px solid #E2E5EA;
  }
  .page-header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #1A1D23;
    letter-spacing: -0.01em;
  }
  .page-header p {
    font-size: 13px;
    color: #6B7280;
    margin-top: 4px;
  }
  .legend {
    display: flex;
    gap: 24px;
    padding: 16px 48px;
    background: #fff;
    border-bottom: 1px solid #E2E5EA;
    font-size: 12px;
    color: #6B7280;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }
  #canvas-container {
    width: 100%;
    min-height: calc(100vh - 110px);
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  svg { display: block; }
</style>
</head>
<body>

<div class="page-header">
  <h1>Settings Flow</h1>
  <p>Desktop web application settings screens and navigation paths</p>
</div>
<div class="legend">
  <div class="legend-item">
    <div class="legend-swatch" style="background:#3B82F6;"></div>
    <span>Primary screen</span>
  </div>
  <div class="legend-item">
    <div class="legend-swatch" style="background:#F59E0B;"></div>
    <span>Modal dialog</span>
  </div>
  <div class="legend-item">
    <svg width="32" height="12"><line x1="0" y1="6" x2="32" y2="6" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#legend-arrow)"/></svg>
    <span>Navigation</span>
  </div>
</div>

<div id="canvas-container"></div>

<script>
// ── Configuration ──────────────────────────────────────────────
const SCREEN_W = 280;
const SCREEN_H = 180;
const MODAL_W = 240;
const MODAL_H = 150;
const H_GAP = 120;
const V_GAP = 80;
const TITLE_BAR_H = 28;
const CORNER_R = 8;
const PADDING = 80;

// ── Screen definitions ─────────────────────────────────────────
const screens = [
  {
    id: 'overview',
    title: 'Settings Overview',
    type: 'screen',
    content: [
      { type: 'heading', text: 'Settings' },
      { type: 'list-item', text: 'Profile', icon: 'user' },
      { type: 'list-item', text: 'Notifications', icon: 'bell' },
      { type: 'list-item', text: 'Security', icon: 'shield' },
      { type: 'list-item', text: 'Billing', icon: 'card' },
    ]
  },
  {
    id: 'profile',
    title: 'Profile Settings',
    type: 'screen',
    content: [
      { type: 'heading', text: 'Profile' },
      { type: 'input', label: 'Full Name' },
      { type: 'input', label: 'Email' },
      { type: 'input', label: 'Company' },
      { type: 'button', text: 'Save Changes' },
    ]
  },
  {
    id: 'notifications',
    title: 'Notification Preferences',
    type: 'screen',
    content: [
      { type: 'heading', text: 'Notifications' },
      { type: 'toggle', label: 'Email alerts', on: true },
      { type: 'toggle', label: 'Push notifications', on: true },
      { type: 'toggle', label: 'Weekly digest', on: false },
      { type: 'toggle', label: 'Marketing', on: false },
    ]
  },
  {
    id: 'security',
    title: 'Security Settings',
    type: 'screen',
    content: [
      { type: 'heading', text: 'Security' },
      { type: 'input', label: 'Current Password', password: true },
      { type: 'input', label: 'New Password', password: true },
      { type: 'button', text: 'Update Password' },
      { type: 'danger-link', text: 'Delete Account' },
    ]
  },
  {
    id: 'delete-modal',
    title: 'Delete Account',
    type: 'modal',
    parent: 'security',
    content: [
      { type: 'modal-heading', text: 'Delete Account?' },
      { type: 'modal-body', text: 'This action is permanent and cannot be undone. All data will be removed.' },
      { type: 'modal-actions', confirm: 'Delete', cancel: 'Cancel' },
    ]
  }
];

const connections = [
  { from: 'overview', to: 'profile', label: 'Profile' },
  { from: 'overview', to: 'notifications', label: 'Notifications' },
  { from: 'overview', to: 'security', label: 'Security' },
  { from: 'security', to: 'delete-modal', label: 'Delete Account' },
];

// ── Layout positions ───────────────────────────────────────────
const positions = {
  'overview':      { x: 0, y: (SCREEN_H + V_GAP) },
  'profile':       { x: SCREEN_W + H_GAP, y: 0 },
  'notifications': { x: SCREEN_W + H_GAP, y: SCREEN_H + V_GAP },
  'security':      { x: SCREEN_W + H_GAP, y: 2 * (SCREEN_H + V_GAP) },
  'delete-modal':  { x: 2 * (SCREEN_W + H_GAP) + 20, y: 2 * (SCREEN_H + V_GAP) + 15 },
};

// ── Compute SVG dimensions ─────────────────────────────────────
const allX = Object.values(positions).map(p => p.x);
const allY = Object.values(positions).map(p => p.y);
const svgW = Math.max(...allX) + SCREEN_W + 2 * PADDING;
const svgH = Math.max(...allY) + SCREEN_H + MODAL_H / 2 + 2 * PADDING;

// ── Create SVG ─────────────────────────────────────────────────
const svg = d3.select('#canvas-container')
  .append('svg')
  .attr('width', svgW)
  .attr('height', svgH);

const g = svg.append('g')
  .attr('transform', `translate(${PADDING}, ${PADDING})`);

// ── Defs: arrows, shadows, patterns ────────────────────────────
const defs = svg.append('defs');

// Arrow marker
defs.append('marker')
  .attr('id', 'arrow')
  .attr('viewBox', '0 0 10 8')
  .attr('refX', 9)
  .attr('refY', 4)
  .attr('markerWidth', 8)
  .attr('markerHeight', 6)
  .attr('orient', 'auto')
  .append('path')
  .attr('d', 'M0,0 L10,4 L0,8 L2,4 Z')
  .attr('fill', '#94A3B8');

// Drop shadow filter
const shadow = defs.append('filter')
  .attr('id', 'shadow')
  .attr('x', '-10%').attr('y', '-10%')
  .attr('width', '130%').attr('height', '140%');
shadow.append('feDropShadow')
  .attr('dx', 0).attr('dy', 2)
  .attr('stdDeviation', 6)
  .attr('flood-color', 'rgba(0,0,0,0.10)');

const shadowModal = defs.append('filter')
  .attr('id', 'shadow-modal')
  .attr('x', '-15%').attr('y', '-15%')
  .attr('width', '140%').attr('height', '150%');
shadowModal.append('feDropShadow')
  .attr('dx', 0).attr('dy', 4)
  .attr('stdDeviation', 12)
  .attr('flood-color', 'rgba(0,0,0,0.22)');

// ── Helper: connection paths ───────────────────────────────────
function getAnchor(id, side) {
  const s = screens.find(sc => sc.id === id);
  const p = positions[id];
  const w = s.type === 'modal' ? MODAL_W : SCREEN_W;
  const h = s.type === 'modal' ? MODAL_H : SCREEN_H;
  if (side === 'right') return { x: p.x + w, y: p.y + h / 2 };
  if (side === 'left')  return { x: p.x, y: p.y + h / 2 };
  if (side === 'top')   return { x: p.x + w / 2, y: p.y };
  if (side === 'bottom') return { x: p.x + w / 2, y: p.y + h };
  return { x: p.x, y: p.y };
}

// ── Draw connections ───────────────────────────────────────────
connections.forEach(conn => {
  const fromScreen = screens.find(s => s.id === conn.from);
  const toScreen = screens.find(s => s.id === conn.to);

  let start, end;

  if (conn.from === 'overview') {
    start = getAnchor(conn.from, 'right');
    end = getAnchor(conn.to, 'left');
  } else if (conn.to === 'delete-modal') {
    start = getAnchor(conn.from, 'right');
    end = getAnchor(conn.to, 'left');
  } else {
    start = getAnchor(conn.from, 'right');
    end = getAnchor(conn.to, 'left');
  }

  const midX = (start.x + end.x) / 2;

  const pathData = `M${start.x},${start.y} C${midX},${start.y} ${midX},${end.y} ${end.x},${end.y}`;

  g.append('path')
    .attr('d', pathData)
    .attr('fill', 'none')
    .attr('stroke', conn.to === 'delete-modal' ? '#EF4444' : '#94A3B8')
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', conn.to === 'delete-modal' ? '6,4' : 'none')
    .attr('marker-end', 'url(#arrow)');

  // Label on connection
  const labelX = midX;
  const labelY = (start.y + end.y) / 2 - 8;

  g.append('rect')
    .attr('x', labelX - 40)
    .attr('y', labelY - 8)
    .attr('width', 80)
    .attr('height', 16)
    .attr('rx', 4)
    .attr('fill', '#fff');

  g.append('text')
    .attr('x', labelX)
    .attr('y', labelY + 3)
    .attr('text-anchor', 'middle')
    .attr('font-size', 10)
    .attr('fill', '#6B7280')
    .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
    .text(conn.label);
});

// ── Draw screens ───────────────────────────────────────────────
screens.forEach(screen => {
  const pos = positions[screen.id];
  const isModal = screen.type === 'modal';
  const w = isModal ? MODAL_W : SCREEN_W;
  const h = isModal ? MODAL_H : SCREEN_H;

  const group = g.append('g')
    .attr('transform', `translate(${pos.x}, ${pos.y})`)
    .style('cursor', 'default');

  // Screen background
  group.append('rect')
    .attr('width', w)
    .attr('height', h)
    .attr('rx', CORNER_R)
    .attr('fill', '#fff')
    .attr('filter', isModal ? 'url(#shadow-modal)' : 'url(#shadow)')
    .attr('stroke', isModal ? '#F59E0B' : '#E2E5EA')
    .attr('stroke-width', isModal ? 1.5 : 1);

  // Title bar
  const barColor = isModal ? '#FEF3C7' : '#F1F5F9';
  group.append('rect')
    .attr('width', w)
    .attr('height', TITLE_BAR_H)
    .attr('rx', CORNER_R)
    .attr('fill', barColor);
  // Bottom corners of title bar
  group.append('rect')
    .attr('y', TITLE_BAR_H - CORNER_R)
    .attr('width', w)
    .attr('height', CORNER_R)
    .attr('fill', barColor);

  // Divider below title bar
  group.append('line')
    .attr('x1', 0).attr('y1', TITLE_BAR_H)
    .attr('x2', w).attr('y2', TITLE_BAR_H)
    .attr('stroke', isModal ? '#FCD34D' : '#E2E5EA')
    .attr('stroke-width', 1);

  // Window dots for screens
  if (!isModal) {
    [0, 1, 2].forEach((i) => {
      group.append('circle')
        .attr('cx', 12 + i * 14)
        .attr('cy', TITLE_BAR_H / 2)
        .attr('r', 4)
        .attr('fill', ['#EF4444', '#F59E0B', '#22C55E'][i])
        .attr('opacity', 0.7);
    });
  }

  // Title text
  group.append('text')
    .attr('x', isModal ? 12 : 56)
    .attr('y', TITLE_BAR_H / 2 + 4)
    .attr('font-size', 11)
    .attr('font-weight', 600)
    .attr('fill', '#374151')
    .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
    .text(screen.title);

  // ── Screen content ─────────────────────────────────────────
  let yOffset = TITLE_BAR_H + 14;
  const contentPad = 14;

  screen.content.forEach(item => {
    if (item.type === 'heading') {
      group.append('text')
        .attr('x', contentPad)
        .attr('y', yOffset)
        .attr('font-size', 12)
        .attr('font-weight', 700)
        .attr('fill', '#1A1D23')
        .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
        .text(item.text);
      yOffset += 16;
    }

    if (item.type === 'list-item') {
      // Row bg
      group.append('rect')
        .attr('x', contentPad - 2)
        .attr('y', yOffset - 9)
        .attr('width', w - 2 * contentPad + 4)
        .attr('height', 22)
        .attr('rx', 4)
        .attr('fill', '#F9FAFB');

      // Icon placeholder
      group.append('rect')
        .attr('x', contentPad + 4)
        .attr('y', yOffset - 5)
        .attr('width', 14)
        .attr('height', 14)
        .attr('rx', 3)
        .attr('fill', '#E0E7FF');

      group.append('text')
        .attr('x', contentPad + 26)
        .attr('y', yOffset + 4)
        .attr('font-size', 10)
        .attr('fill', '#374151')
        .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
        .text(item.text);

      // Chevron
      group.append('text')
        .attr('x', w - contentPad - 6)
        .attr('y', yOffset + 4)
        .attr('font-size', 10)
        .attr('fill', '#9CA3AF')
        .attr('text-anchor', 'end')
        .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
        .text('\u203A');

      yOffset += 26;
    }

    if (item.type === 'input') {
      group.append('text')
        .attr('x', contentPad)
        .attr('y', yOffset)
        .attr('font-size', 9)
        .attr('fill', '#6B7280')
        .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
        .text(item.label);
      yOffset += 10;

      group.append('rect')
        .attr('x', contentPad)
        .attr('y', yOffset - 7)
        .attr('width', w - 2 * contentPad)
        .attr('height', 18)
        .attr('rx', 4)
        .attr('fill', '#F9FAFB')
        .attr('stroke', '#D1D5DB')
        .attr('stroke-width', 0.5);

      if (item.password) {
        group.append('text')
          .attr('x', contentPad + 6)
          .attr('y', yOffset + 5)
          .attr('font-size', 10)
          .attr('fill', '#9CA3AF')
          .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
          .text('\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022');
      }

      yOffset += 18;
    }

    if (item.type === 'toggle') {
      group.append('text')
        .attr('x', contentPad)
        .attr('y', yOffset + 3)
        .attr('font-size', 10)
        .attr('fill', '#374151')
        .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
        .text(item.label);

      // Toggle track
      const trackX = w - contentPad - 28;
      group.append('rect')
        .attr('x', trackX)
        .attr('y', yOffset - 5)
        .attr('width', 26)
        .attr('height', 14)
        .attr('rx', 7)
        .attr('fill', item.on ? '#3B82F6' : '#D1D5DB');

      // Toggle knob
      group.append('circle')
        .attr('cx', item.on ? trackX + 19 : trackX + 7)
        .attr('cy', yOffset + 2)
        .attr('r', 5)
        .attr('fill', '#fff');

      yOffset += 24;
    }

    if (item.type === 'button') {
      group.append('rect')
        .attr('x', contentPad)
        .attr('y', yOffset - 4)
        .attr('width', w - 2 * contentPad)
        .attr('height', 22)
        .attr('rx', 5)
        .attr('fill', '#3B82F6');

      group.append('text')
        .attr('x', w / 2)
        .attr('y', yOffset + 9)
        .attr('text-anchor', 'middle')
        .attr('font-size', 10)
        .attr('font-weight', 600)
        .attr('fill', '#fff')
        .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
        .text(item.text);
      yOffset += 28;
    }

    if (item.type === 'danger-link') {
      group.append('text')
        .attr('x', w / 2)
        .attr('y', yOffset + 4)
        .attr('text-anchor', 'middle')
        .attr('font-size', 10)
        .attr('fill', '#EF4444')
        .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
        .attr('text-decoration', 'underline')
        .text(item.text);
      yOffset += 18;
    }

    if (item.type === 'modal-heading') {
      group.append('text')
        .attr('x', contentPad)
        .attr('y', yOffset + 2)
        .attr('font-size', 12)
        .attr('font-weight', 700)
        .attr('fill', '#991B1B')
        .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
        .text(item.text);
      yOffset += 18;
    }

    if (item.type === 'modal-body') {
      // Word-wrap the text
      const words = item.text.split(' ');
      let line = '';
      const lines = [];
      const maxW = w - 2 * contentPad;
      words.forEach(word => {
        const test = line ? line + ' ' + word : word;
        if (test.length * 5 > maxW) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      });
      if (line) lines.push(line);

      lines.forEach((l, i) => {
        group.append('text')
          .attr('x', contentPad)
          .attr('y', yOffset + i * 13)
          .attr('font-size', 9.5)
          .attr('fill', '#6B7280')
          .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
          .text(l);
      });
      yOffset += lines.length * 13 + 8;
    }

    if (item.type === 'modal-actions') {
      const btnW = (w - 2 * contentPad - 8) / 2;

      // Cancel
      group.append('rect')
        .attr('x', contentPad)
        .attr('y', yOffset - 2)
        .attr('width', btnW)
        .attr('height', 22)
        .attr('rx', 5)
        .attr('fill', '#F3F4F6')
        .attr('stroke', '#D1D5DB')
        .attr('stroke-width', 0.5);
      group.append('text')
        .attr('x', contentPad + btnW / 2)
        .attr('y', yOffset + 11)
        .attr('text-anchor', 'middle')
        .attr('font-size', 10)
        .attr('font-weight', 500)
        .attr('fill', '#374151')
        .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
        .text(item.cancel);

      // Delete
      group.append('rect')
        .attr('x', contentPad + btnW + 8)
        .attr('y', yOffset - 2)
        .attr('width', btnW)
        .attr('height', 22)
        .attr('rx', 5)
        .attr('fill', '#EF4444');
      group.append('text')
        .attr('x', contentPad + btnW + 8 + btnW / 2)
        .attr('y', yOffset + 11)
        .attr('text-anchor', 'middle')
        .attr('font-size', 10)
        .attr('font-weight', 600)
        .attr('fill', '#fff')
        .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
        .text(item.confirm);

      yOffset += 28;
    }
  });

  // ── Screen label beneath ───────────────────────────────────
  const labelColor = isModal ? '#D97706' : '#3B82F6';
  const badge = isModal ? 'MODAL' : 'SCREEN';

  group.append('rect')
    .attr('x', w / 2 - 28)
    .attr('y', h + 8)
    .attr('width', 56)
    .attr('height', 18)
    .attr('rx', 9)
    .attr('fill', isModal ? '#FEF3C7' : '#EFF6FF');

  group.append('text')
    .attr('x', w / 2)
    .attr('y', h + 20)
    .attr('text-anchor', 'middle')
    .attr('font-size', 9)
    .attr('font-weight', 600)
    .attr('fill', labelColor)
    .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
    .text(badge);
});

// ── Step indicators on Overview ────────────────────────────────
const stepLabels = [
  { id: 'overview', num: '1' },
  { id: 'profile', num: '2a' },
  { id: 'notifications', num: '2b' },
  { id: 'security', num: '2c' },
  { id: 'delete-modal', num: '3' },
];

stepLabels.forEach(step => {
  const sc = screens.find(s => s.id === step.id);
  const pos = positions[step.id];
  const isModal = sc.type === 'modal';
  const w = isModal ? MODAL_W : SCREEN_W;

  g.append('circle')
    .attr('cx', pos.x - 14)
    .attr('cy', pos.y - 10)
    .attr('r', 12)
    .attr('fill', isModal ? '#F59E0B' : '#3B82F6');

  g.append('text')
    .attr('x', pos.x - 14)
    .attr('y', pos.y - 6)
    .attr('text-anchor', 'middle')
    .attr('font-size', 10)
    .attr('font-weight', 700)
    .attr('fill', '#fff')
    .attr('font-family', '-apple-system, BlinkMacSystemFont, sans-serif')
    .text(step.num);
});
</script>
</body>
</html>
