<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery App - Screen Flow Diagram</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  #canvas-container {
    width: 100%;
    height: 100vh;
    cursor: grab;
  }
  #canvas-container:active { cursor: grabbing; }

  .screen-group { cursor: pointer; }
  .screen-group:hover .phone-frame { filter: drop-shadow(0 0 20px rgba(99,102,241,0.4)); }

  .flow-arrow { fill: none; stroke: #6366f1; stroke-width: 2.5; }
  .flow-arrow-head { fill: #6366f1; }

  .screen-label {
    font-size: 15px;
    font-weight: 600;
    fill: #c7c9d1;
    text-anchor: middle;
  }
  .screen-sublabel {
    font-size: 11px;
    fill: #8b8d97;
    text-anchor: middle;
  }

  .title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(15,17,23,0.85);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    padding: 0 24px;
    z-index: 10;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .title-bar h1 {
    font-size: 16px;
    font-weight: 600;
    color: #e0e0e0;
  }
  .title-bar span {
    font-size: 12px;
    color: #6366f1;
    margin-left: 12px;
    background: rgba(99,102,241,0.12);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .zoom-controls {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 10;
  }
  .zoom-btn {
    width: 40px;
    height: 40px;
    background: rgba(30,32,42,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: #c7c9d1;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  .zoom-btn:hover { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.3); }

  .legend {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: rgba(30,32,42,0.9);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 18px;
    z-index: 10;
    backdrop-filter: blur(8px);
    font-size: 12px;
    color: #8b8d97;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
</style>
</head>
<body>

<div class="title-bar">
  <h1>Food Delivery App</h1>
  <span>5 Screens</span>
</div>

<div class="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-out">&minus;</button>
  <button class="zoom-btn" id="zoom-fit" style="font-size:13px">Fit</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div> Navigation flow</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div> Back navigation</div>
  <div class="legend-item" style="color:#6b7080; font-size:11px; margin-top:4px;">Scroll to zoom &middot; Drag to pan</div>
</div>

<div id="canvas-container"></div>

<script>
const PHONE_W = 220;
const PHONE_H = 440;
const PHONE_R = 24;
const SCREEN_GAP = 160;
const STATUSBAR_H = 28;
const NAVBAR_H = 44;
const BOTTOMNAV_H = 0;

const screens = [
  { id: 'home',         label: 'Home Feed',          sub: 'Restaurant listings',    x: 0 },
  { id: 'detail',       label: 'Restaurant Detail',  sub: 'Menu & items',           x: 1 },
  { id: 'cart',          label: 'Cart',               sub: 'Order summary',          x: 2 },
  { id: 'checkout',     label: 'Checkout',           sub: 'Address & payment',      x: 3 },
  { id: 'confirmation', label: 'Order Confirmed',    sub: 'Success state',          x: 4 },
];

const flows = [
  { from: 'home', to: 'detail', label: 'Tap restaurant' },
  { from: 'detail', to: 'cart', label: 'View cart' },
  { from: 'cart', to: 'checkout', label: 'Checkout' },
  { from: 'checkout', to: 'confirmation', label: 'Place order' },
];

const backFlows = [
  { from: 'detail', to: 'home' },
  { from: 'cart', to: 'detail' },
  { from: 'checkout', to: 'cart' },
  { from: 'confirmation', to: 'home' },
];

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('#canvas-container')
  .append('svg')
  .attr('width', width)
  .attr('height', height);

const g = svg.append('g');

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.2, 3])
  .on('zoom', (e) => g.attr('transform', e.transform));

svg.call(zoom);

d3.select('#zoom-in').on('click', () => svg.transition().duration(300).call(zoom.scaleBy, 1.3));
d3.select('#zoom-out').on('click', () => svg.transition().duration(300).call(zoom.scaleBy, 0.7));
d3.select('#zoom-fit').on('click', fitToView);

// Compute positions
const totalW = screens.length * PHONE_W + (screens.length - 1) * SCREEN_GAP;
const startX = (width - totalW) / 2;
const startY = height / 2 - PHONE_H / 2 + 10;

screens.forEach((s, i) => {
  s.px = startX + i * (PHONE_W + SCREEN_GAP);
  s.py = startY;
});

// Arrow marker
const defs = svg.append('defs');
defs.append('marker')
  .attr('id', 'arrowhead')
  .attr('viewBox', '0 0 10 7')
  .attr('refX', 10).attr('refY', 3.5)
  .attr('markerWidth', 10).attr('markerHeight', 7)
  .attr('orient', 'auto')
  .append('polygon')
  .attr('points', '0 0, 10 3.5, 0 7')
  .attr('fill', '#6366f1');

defs.append('marker')
  .attr('id', 'arrowhead-back')
  .attr('viewBox', '0 0 10 7')
  .attr('refX', 10).attr('refY', 3.5)
  .attr('markerWidth', 8).attr('markerHeight', 6)
  .attr('orient', 'auto')
  .append('polygon')
  .attr('points', '0 0, 10 3.5, 0 7')
  .attr('fill', '#f97316');

// Draw forward flow arrows
flows.forEach(f => {
  const from = screens.find(s => s.id === f.from);
  const to = screens.find(s => s.id === f.to);
  const x1 = from.px + PHONE_W + 8;
  const x2 = to.px - 8;
  const y = from.py + PHONE_H / 2 - 12;
  const mx = (x1 + x2) / 2;

  g.append('path')
    .attr('d', `M${x1},${y} C${mx},${y} ${mx},${y} ${x2},${y}`)
    .attr('class', 'flow-arrow')
    .attr('marker-end', 'url(#arrowhead)');

  // Label
  g.append('text')
    .attr('x', mx)
    .attr('y', y - 12)
    .attr('text-anchor', 'middle')
    .attr('font-size', 10)
    .attr('fill', '#6366f1')
    .attr('font-weight', 500)
    .text(f.label);
});

// Draw back flow arrows (curved below)
backFlows.forEach(f => {
  const from = screens.find(s => s.id === f.from);
  const to = screens.find(s => s.id === f.to);
  const x1 = from.px + 20;
  const x2 = to.px + PHONE_W - 20;
  const y = from.py + PHONE_H + 30;

  const midX = (x1 + x2) / 2;
  const curveY = y + 30 + Math.abs(from.x - to.x) * 15;

  g.append('path')
    .attr('d', `M${x1},${y} C${x1},${curveY} ${x2},${curveY} ${x2},${y}`)
    .attr('fill', 'none')
    .attr('stroke', '#f97316')
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '6,4')
    .attr('opacity', 0.5)
    .attr('marker-end', 'url(#arrowhead-back)');
});

// Draw each screen
screens.forEach((screen) => {
  const sg = g.append('g')
    .attr('class', 'screen-group')
    .attr('transform', `translate(${screen.px}, ${screen.py})`);

  // Phone shadow
  sg.append('rect')
    .attr('x', 4).attr('y', 6)
    .attr('width', PHONE_W).attr('height', PHONE_H)
    .attr('rx', PHONE_R)
    .attr('fill', 'rgba(0,0,0,0.35)')
    .attr('filter', 'blur(8px)');

  // Phone frame
  sg.append('rect')
    .attr('class', 'phone-frame')
    .attr('width', PHONE_W).attr('height', PHONE_H)
    .attr('rx', PHONE_R)
    .attr('fill', '#1a1c26')
    .attr('stroke', '#2e3040')
    .attr('stroke-width', 1.5);

  // Inner screen area
  const clipId = `clip-${screen.id}`;
  defs.append('clipPath').attr('id', clipId)
    .append('rect')
    .attr('x', 6).attr('y', 6)
    .attr('width', PHONE_W - 12).attr('height', PHONE_H - 12)
    .attr('rx', PHONE_R - 4);

  const inner = sg.append('g').attr('clip-path', `url(#${clipId})`);

  // Screen background
  inner.append('rect')
    .attr('x', 6).attr('y', 6)
    .attr('width', PHONE_W - 12).attr('height', PHONE_H - 12)
    .attr('fill', '#f5f5f7');

  // Status bar
  drawStatusBar(inner);

  // Screen-specific wireframe content
  const contentY = 6 + STATUSBAR_H;
  switch(screen.id) {
    case 'home': drawHomeScreen(inner, contentY); break;
    case 'detail': drawDetailScreen(inner, contentY); break;
    case 'cart': drawCartScreen(inner, contentY); break;
    case 'checkout': drawCheckoutScreen(inner, contentY); break;
    case 'confirmation': drawConfirmationScreen(inner, contentY); break;
  }

  // Label below phone
  sg.append('text')
    .attr('class', 'screen-label')
    .attr('x', PHONE_W / 2)
    .attr('y', PHONE_H + 28)
    .text(screen.label);

  sg.append('text')
    .attr('class', 'screen-sublabel')
    .attr('x', PHONE_W / 2)
    .attr('y', PHONE_H + 44)
    .text(screen.sub);

  // Step number badge
  sg.append('circle')
    .attr('cx', PHONE_W / 2)
    .attr('cy', -18)
    .attr('r', 14)
    .attr('fill', '#6366f1');
  sg.append('text')
    .attr('x', PHONE_W / 2)
    .attr('y', -13)
    .attr('text-anchor', 'middle')
    .attr('font-size', 12)
    .attr('font-weight', 700)
    .attr('fill', '#fff')
    .text(screen.x + 1);
});

// --- Drawing helpers ---

function drawStatusBar(parent) {
  const y = 8;
  parent.append('rect')
    .attr('x', 6).attr('y', 6)
    .attr('width', PHONE_W - 12).attr('height', STATUSBAR_H)
    .attr('fill', '#fff');
  // Time
  parent.append('text')
    .attr('x', 20).attr('y', y + 16)
    .attr('font-size', 9).attr('font-weight', 600).attr('fill', '#1a1a1a')
    .text('9:41');
  // Signal dots
  [0,1,2].forEach((i) => {
    parent.append('circle')
      .attr('cx', PHONE_W - 22 - i * 10).attr('cy', y + 12)
      .attr('r', 2.5).attr('fill', '#1a1a1a');
  });
  // Battery
  parent.append('rect')
    .attr('x', PHONE_W - 42).attr('y', y + 8)
    .attr('width', 16).attr('height', 8)
    .attr('rx', 2)
    .attr('fill', 'none').attr('stroke', '#1a1a1a').attr('stroke-width', 1);
  parent.append('rect')
    .attr('x', PHONE_W - 40).attr('y', y + 10)
    .attr('width', 10).attr('height', 4)
    .attr('rx', 1).attr('fill', '#1a1a1a');
}

function drawNavBar(parent, y, title, hasBack) {
  parent.append('rect')
    .attr('x', 6).attr('y', y)
    .attr('width', PHONE_W - 12).attr('height', NAVBAR_H)
    .attr('fill', '#fff');
  parent.append('line')
    .attr('x1', 6).attr('y1', y + NAVBAR_H)
    .attr('x2', PHONE_W - 6).attr('y2', y + NAVBAR_H)
    .attr('stroke', '#e5e5e7').attr('stroke-width', 1);

  if (hasBack) {
    // Back chevron
    parent.append('text')
      .attr('x', 20).attr('y', y + 27)
      .attr('font-size', 16).attr('fill', '#6366f1').attr('font-weight', 300)
      .text('\u2039');
    parent.append('text')
      .attr('x', 30).attr('y', y + 27)
      .attr('font-size', 10).attr('fill', '#6366f1')
      .text('Back');
  }

  parent.append('text')
    .attr('x', PHONE_W / 2).attr('y', y + 28)
    .attr('text-anchor', 'middle')
    .attr('font-size', 12).attr('font-weight', 600).attr('fill', '#1a1a1a')
    .text(title);

  return y + NAVBAR_H;
}

function drawRestaurantCard(parent, x, y, w, name, cuisine, rating, time) {
  // Card bg
  parent.append('rect')
    .attr('x', x).attr('y', y)
    .attr('width', w).attr('height', 80)
    .attr('rx', 8).attr('fill', '#fff')
    .attr('stroke', '#e8e8ec').attr('stroke-width', 0.5);

  // Image placeholder
  parent.append('rect')
    .attr('x', x + 8).attr('y', y + 8)
    .attr('width', 56).attr('height', 56)
    .attr('rx', 8).attr('fill', '#e5e5ea');
  parent.append('text')
    .attr('x', x + 36).attr('y', y + 40)
    .attr('text-anchor', 'middle')
    .attr('font-size', 16).attr('fill', '#b0b0b8')
    .text('\uD83C\uDF54');

  // Text
  parent.append('text')
    .attr('x', x + 72).attr('y', y + 24)
    .attr('font-size', 11).attr('font-weight', 600).attr('fill', '#1a1a1a')
    .text(name);
  parent.append('text')
    .attr('x', x + 72).attr('y', y + 38)
    .attr('font-size', 9).attr('fill', '#8b8d97')
    .text(cuisine);

  // Rating + time row
  parent.append('text')
    .attr('x', x + 72).attr('y', y + 54)
    .attr('font-size', 9).attr('fill', '#f59e0b').attr('font-weight', 600)
    .text(`★ ${rating}`);
  parent.append('text')
    .attr('x', x + 105).attr('y', y + 54)
    .attr('font-size', 9).attr('fill', '#8b8d97')
    .text(`${time} min`);
}

function drawHomeScreen(parent, contentY) {
  const cy = drawNavBar(parent, contentY, 'FoodDash', false);

  // Search bar
  parent.append('rect')
    .attr('x', 16).attr('y', cy + 10)
    .attr('width', PHONE_W - 32).attr('height', 30)
    .attr('rx', 15).attr('fill', '#ededf0');
  parent.append('text')
    .attr('x', 36).attr('y', cy + 29)
    .attr('font-size', 10).attr('fill', '#a0a0a8')
    .text('Search restaurants...');
  parent.append('text')
    .attr('x', 24).attr('y', cy + 29)
    .attr('font-size', 11).attr('fill', '#a0a0a8')
    .text('\uD83D\uDD0D');

  // Category pills
  const cats = ['All', 'Pizza', 'Sushi', 'Burgers'];
  cats.forEach((c, i) => {
    const px = 16 + i * 46;
    parent.append('rect')
      .attr('x', px).attr('y', cy + 48)
      .attr('width', 42).attr('height', 20)
      .attr('rx', 10)
      .attr('fill', i === 0 ? '#6366f1' : '#ededf0');
    parent.append('text')
      .attr('x', px + 21).attr('y', cy + 62)
      .attr('text-anchor', 'middle')
      .attr('font-size', 8).attr('font-weight', 500)
      .attr('fill', i === 0 ? '#fff' : '#555')
      .text(c);
  });

  // Section title
  parent.append('text')
    .attr('x', 16).attr('y', cy + 86)
    .attr('font-size', 11).attr('font-weight', 600).attr('fill', '#1a1a1a')
    .text('Nearby Restaurants');

  // Restaurant cards
  drawRestaurantCard(parent, 14, cy + 94, PHONE_W - 28, 'Burger Palace', 'American, Fast Food', '4.5', '25');
  drawRestaurantCard(parent, 14, cy + 182, PHONE_W - 28, 'Sakura Sushi', 'Japanese, Sushi', '4.8', '35');
  drawRestaurantCard(parent, 14, cy + 270, PHONE_W - 28, 'Pizza Roma', 'Italian, Pizza', '4.3', '20');

  // Bottom tab bar
  drawBottomTab(parent);
}

function drawBottomTab(parent) {
  const y = PHONE_H - 52;
  parent.append('rect')
    .attr('x', 6).attr('y', y)
    .attr('width', PHONE_W - 12).attr('height', 46)
    .attr('fill', '#fff');
  parent.append('line')
    .attr('x1', 6).attr('y1', y)
    .attr('x2', PHONE_W - 6).attr('y2', y)
    .attr('stroke', '#e5e5e7').attr('stroke-width', 1);

  const tabs = [
    { icon: '\uD83C\uDFE0', label: 'Home', active: true },
    { icon: '\uD83D\uDD0D', label: 'Search' },
    { icon: '\uD83D\uDCC3', label: 'Orders' },
    { icon: '\uD83D\uDC64', label: 'Profile' }
  ];
  tabs.forEach((t, i) => {
    const tx = 6 + (PHONE_W - 12) / 4 * i + (PHONE_W - 12) / 8;
    parent.append('text')
      .attr('x', tx).attr('y', y + 20)
      .attr('text-anchor', 'middle')
      .attr('font-size', 14)
      .text(t.icon);
    parent.append('text')
      .attr('x', tx).attr('y', y + 34)
      .attr('text-anchor', 'middle')
      .attr('font-size', 7)
      .attr('fill', t.active ? '#6366f1' : '#a0a0a8')
      .attr('font-weight', t.active ? 600 : 400)
      .text(t.label);
  });
}

function drawDetailScreen(parent, contentY) {
  const cy = drawNavBar(parent, contentY, 'Burger Palace', true);

  // Hero image
  parent.append('rect')
    .attr('x', 6).attr('y', cy)
    .attr('width', PHONE_W - 12).attr('height', 90)
    .attr('fill', '#ddd5c8');
  parent.append('text')
    .attr('x', PHONE_W / 2).attr('y', cy + 50)
    .attr('text-anchor', 'middle')
    .attr('font-size', 28)
    .text('\uD83C\uDF54');
  parent.append('text')
    .attr('x', PHONE_W / 2).attr('y', cy + 76)
    .attr('text-anchor', 'middle')
    .attr('font-size', 9).attr('fill', '#6b5e4f')
    .text('★ 4.5  ·  25 min  ·  $2.99 delivery');

  // Menu section title
  parent.append('text')
    .attr('x', 16).attr('y', cy + 108)
    .attr('font-size', 11).attr('font-weight', 600).attr('fill', '#1a1a1a')
    .text('Menu');

  // Menu items
  const items = [
    { name: 'Classic Burger', price: '$8.99', desc: 'Beef patty, lettuce, tomato' },
    { name: 'Cheese Fries', price: '$5.49', desc: 'Crispy fries, cheddar sauce' },
    { name: 'Milkshake', price: '$4.99', desc: 'Vanilla, chocolate, or straw.' },
    { name: 'Chicken Wrap', price: '$9.49', desc: 'Grilled chicken, ranch' },
  ];

  items.forEach((item, i) => {
    const iy = cy + 116 + i * 56;
    parent.append('rect')
      .attr('x', 14).attr('y', iy)
      .attr('width', PHONE_W - 28).attr('height', 50)
      .attr('rx', 6).attr('fill', '#fff')
      .attr('stroke', '#e8e8ec').attr('stroke-width', 0.5);

    parent.append('text')
      .attr('x', 22).attr('y', iy + 18)
      .attr('font-size', 10).attr('font-weight', 600).attr('fill', '#1a1a1a')
      .text(item.name);
    parent.append('text')
      .attr('x', 22).attr('y', iy + 32)
      .attr('font-size', 8).attr('fill', '#8b8d97')
      .text(item.desc);
    parent.append('text')
      .attr('x', PHONE_W - 22).attr('y', iy + 18)
      .attr('text-anchor', 'end')
      .attr('font-size', 10).attr('font-weight', 600).attr('fill', '#6366f1')
      .text(item.price);

    // Add button
    parent.append('rect')
      .attr('x', PHONE_W - 48).attr('y', iy + 26)
      .attr('width', 24).attr('height', 16)
      .attr('rx', 8).attr('fill', '#6366f1');
    parent.append('text')
      .attr('x', PHONE_W - 36).attr('y', iy + 37)
      .attr('text-anchor', 'middle')
      .attr('font-size', 10).attr('fill', '#fff')
      .text('+');
  });

  // View cart button
  parent.append('rect')
    .attr('x', 16).attr('y', PHONE_H - 58)
    .attr('width', PHONE_W - 32).attr('height', 36)
    .attr('rx', 18).attr('fill', '#6366f1');
  parent.append('text')
    .attr('x', PHONE_W / 2).attr('y', PHONE_H - 35)
    .attr('text-anchor', 'middle')
    .attr('font-size', 11).attr('font-weight', 600).attr('fill', '#fff')
    .text('View Cart (3)');
}

function drawCartScreen(parent, contentY) {
  const cy = drawNavBar(parent, contentY, 'Your Cart', true);

  const cartItems = [
    { name: 'Classic Burger', qty: 2, price: '$17.98' },
    { name: 'Cheese Fries', qty: 1, price: '$5.49' },
    { name: 'Milkshake', qty: 1, price: '$4.99' },
  ];

  parent.append('text')
    .attr('x', 16).attr('y', cy + 20)
    .attr('font-size', 9).attr('fill', '#8b8d97')
    .text('Burger Palace');

  cartItems.forEach((item, i) => {
    const iy = cy + 30 + i * 52;
    parent.append('rect')
      .attr('x', 14).attr('y', iy)
      .attr('width', PHONE_W - 28).attr('height', 46)
      .attr('rx', 6).attr('fill', '#fff')
      .attr('stroke', '#e8e8ec').attr('stroke-width', 0.5);

    parent.append('text')
      .attr('x', 22).attr('y', iy + 18)
      .attr('font-size', 10).attr('font-weight', 600).attr('fill', '#1a1a1a')
      .text(item.name);

    // Qty stepper
    parent.append('rect')
      .attr('x', 22).attr('y', iy + 24)
      .attr('width', 56).attr('height', 16)
      .attr('rx', 8).attr('fill', '#f0f0f3');
    parent.append('text')
      .attr('x', 32).attr('y', iy + 35)

function fitToView() {
  const padX = 100;
  const padY = 100;
  const minX = d3.min(screens, s => s.px) - padX;
  const minY = d3.min(screens, s => s.py) - padY;
  const maxX = d3.max(screens, s => s.px + PHONE_W) + padX;
  const maxY = d3.max(screens, s => s.py + PHONE_H + 60) + padY;
  const bw = maxX - minX;
  const bh = maxY - minY;
  const scale = Math.min(width / bw, height / bh) * 0.92;
  const tx = (width - bw * scale) / 2 - minX * scale;
  const ty = (height - bh * scale) / 2 - minY * scale;

  svg.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// Initial fit
fitToView();

// Handle window resize
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  svg.attr('width', w).attr('height', h);
});
