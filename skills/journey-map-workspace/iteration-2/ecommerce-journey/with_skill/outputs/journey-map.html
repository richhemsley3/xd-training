<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Purchase Experience — Customer Journey Map</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    /* ─── Reset ─── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ─── CSS Custom Properties ─── */
    :root {
      --bg-canvas: #FAF8F5;
      --bg-card: #FFFFFF;
      --bg-header: #F4F1EB;
      --bg-elevated: #FFFFFF;
      --border-subtle: #EBE6DD;
      --border-default: #E0DCD3;
      --border-strong: #D0CBC3;
      --border-focus: #013D5B;
      --text-primary: #1C1A17;
      --text-secondary: #54514D;
      --text-tertiary: #6B6760;
      --text-disabled: #B0ABA2;
      --text-on-primary: #FFFFFF;
      --interactive-primary: #013D5B;
      --interactive-primary-hover: #05314D;
      --interactive-primary-subtle: #D9EBED;
      --phase-1: #805AA1;
      --phase-2: #013D5B;
      --phase-3: #0C4A69;
      --phase-4: #7A9A01;
      --phase-5: #8A7515;
      --emotion-positive: #7A9A01;
      --emotion-neutral: #0C4A69;
      --emotion-negative: #CF6253;
      --accent-pain: #BF5547;
      --accent-pain-bg: #FFEEEB;
      --accent-opportunity: #62800B;
      --accent-opportunity-bg: #F4FAEB;
      --accent-need: #8A7515;
      --accent-need-bg: #FCF9D9;
      --role-primary: #805AA1;
      --role-secondary: #013D5B;
      --role-tertiary: #6B6760;
      --role-active: #7A9A01;
    }

    body {
      background: var(--bg-canvas);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 32px;
    }

    /* ─── Title Bar ─── */
    .title-bar {
      margin-bottom: 24px;
    }
    .title-bar h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .persona-info {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 8px;
    }
    .persona-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-header);
      border: 2px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text-tertiary);
    }
    .persona-details {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .persona-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .persona-role {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .persona-goal {
      font-size: 12px;
      color: var(--text-tertiary);
      font-style: italic;
    }

    /* ─── Grid Container ─── */
    .journey-grid-wrapper {
      overflow-x: auto;
      border: 1px solid var(--border-default);
      border-radius: 12px;
      background: var(--border-subtle);
      position: relative;
    }
    .journey-grid-wrapper.scrolled .row-label {
      box-shadow: 4px 0 8px rgba(0,0,0,0.06);
    }

    .journey-grid {
      display: grid;
      gap: 1px;
      min-width: max-content;
    }

    /* ─── Row Labels (sticky) ─── */
    .row-label {
      position: sticky;
      left: 0;
      z-index: 10;
      width: 140px;
      min-width: 140px;
      background: var(--bg-header);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: box-shadow 0.2s;
    }
    .row-label.phase-label-row {
      background: var(--bg-header);
    }

    /* ─── Phase Headers ─── */
    .phase-header {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-on-primary);
      cursor: pointer;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .phase-header:first-of-type,
    .phase-header.first-in-phase {
      border-top-left-radius: 8px;
    }
    .phase-header:last-of-type,
    .phase-header.last-in-phase {
      border-top-right-radius: 8px;
    }
    .phase-icon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    /* ─── Step Headers ─── */
    .step-header {
      height: 32px;
      background: var(--bg-card);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* ─── Content Cells ─── */
    .cell {
      background: var(--bg-card);
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
      min-height: 64px;
      display: flex;
      align-items: flex-start;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      transition: background 0.15s, box-shadow 0.15s;
      cursor: default;
    }
    .cell:hover {
      background: rgba(1, 61, 91, 0.05);
      box-shadow: inset 0 0 0 1px rgba(1, 61, 91, 0.08);
    }
    .cell.empty-cell {
      border: 1px dashed var(--border-subtle);
      color: var(--text-disabled);
      font-style: italic;
    }

    /* ─── Role Badge Pills ─── */
    .role-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .role-badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .role-badge:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .role-badge.active-filter {
      box-shadow: 0 0 0 2px currentColor;
    }

    /* ─── Touchpoint Icons ─── */
    .touchpoint-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .touchpoint-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--bg-header);
      padding: 3px 8px;
      border-radius: 4px;
    }
    .touchpoint-icon {
      font-size: 13px;
    }

    /* ─── Pain Points ─── */
    .pain-point-cell {
      background: var(--accent-pain-bg);
    }
    .pain-point-cell:hover {
      background: #FFE4DF;
    }
    .pain-point-text {
      color: var(--accent-pain);
      font-size: 12px;
    }
    .pain-marker {
      margin-right: 4px;
    }

    /* ─── Opportunities ─── */
    .opportunity-cell {
      background: var(--accent-opportunity-bg);
    }
    .opportunity-cell:hover {
      background: #ECF5DD;
    }
    .opportunity-text {
      color: var(--accent-opportunity);
      font-size: 12px;
    }

    /* ─── Needs ─── */
    .need-cell {
      background: var(--accent-need-bg);
    }
    .need-cell:hover {
      background: #F8F3CC;
    }
    .need-text {
      color: var(--accent-need);
      font-style: italic;
      font-size: 12px;
    }

    /* ─── Emotion Row ─── */
    .emotion-row-cell {
      background: var(--bg-card);
      height: 120px;
      padding: 0;
      position: relative;
      overflow: visible;
    }
    .emotion-svg-container {
      position: relative;
      height: 100%;
    }

    /* ─── Support Reliance Bar ─── */
    .support-bar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
    }
    .support-bar {
      width: 80%;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
    }
    .support-label {
      font-size: 10px;
      color: var(--text-tertiary);
    }

    /* ─── Metrics ─── */
    .metric-card {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .metric-value {
      font-size: 16px;
      font-weight: 700;
    }
    .metric-name {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ─── Tooltip ─── */
    .tooltip {
      position: fixed;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      pointer-events: none;
      z-index: 100;
      max-width: 250px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .tooltip.visible {
      opacity: 1;
    }
    .tooltip-title {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .tooltip-score {
      font-size: 11px;
      margin-top: 4px;
      color: var(--text-tertiary);
    }

    /* ─── Phase Column Separator ─── */
    .phase-separator {
      border-left: 2px solid var(--border-strong);
    }

    /* ─── Legend ─── */
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* ─── Print Styles ─── */
    @media print {
      body { padding: 16px; background: #fff; }
      .journey-grid-wrapper { overflow: visible; border: none; }
      .journey-grid { min-width: unset; }
      .row-label { position: relative; }
      .phase-header { position: relative; }
      .tooltip { display: none; }
    }
  </style>
</head>
<body>
  <div class="title-bar">
    <h1>E-Commerce Purchase Experience</h1>
    <div class="persona-info">
      <div class="persona-avatar">&#128100;</div>
      <div class="persona-details">
        <span class="persona-name">Online Shopper</span>
        <span class="persona-role">E-Commerce Customer</span>
        <span class="persona-goal">Find, compare, and purchase products with confidence and minimal friction</span>
      </div>
    </div>
  </div>

  <div class="journey-grid-wrapper" id="gridWrapper">
    <div class="journey-grid" id="journeyGrid"></div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    // ─── Journey Data ───
    const journeyData = {
      title: "E-Commerce Purchase Experience",
      persona: {
        name: "Online Shopper",
        role: "E-Commerce Customer",
        goal: "Find, compare, and purchase products with confidence and minimal friction"
      },
      phases: [
        {
          id: "browse",
          label: "Browse",
          icon: "\uD83D\uDD0D",
          color: "#805AA1",
          steps: [
            {
              id: "search-discover",

              ],

            {

              ],

              needs: "Clear product photos, specs, and authentic reviews",

              touchpoints: ["Website", "Mobile App"],

              metrics: { name: "PDP Bounce Rate", value: "38%" },
              supportReliance: "light"
            }
          ]
        },
        {
          id: "compare",
          label: "Compare",
          icon: "\u2696\uFE0F",
          color: "#013D5B",
          steps: [
            {
              id: "compare-options",
              label: "Compare Options",
              owner: { name: "Product", color: "#013D5B" },
              collaborators: [
                { name: "Marketing", color: "#805AA1" }
              ],
              emotion: { score: 0.55, label: "Uncertain", annotation: "Overwhelmed by too many similar options" },
              needs: "Side-by-side comparison tools and clear differentiators",

            {
              id: "read-reviews",

                { name: "Support", color: "#0C4A69" }

              supportReliance: "light"
            }
          ]
        },
        {
          id: "purchase",
          label: "Purchase",
          icon: "\uD83D\uDED2",
          color: "#0C4A69",
          steps: [
            {
              id: "add-to-cart",
              label: "Add to Cart",
              owner: { name: "Product", color: "#013D5B" },
              collaborators: [
                { name: "Marketing", color: "#805AA1" }
              ],
              emotion: { score: 0.65, label: "Decided", annotation: "Confident in choice, ready to buy" },
              needs: "Clear pricing, stock availability, and delivery estimates",
              actions: "Adds item to cart, selects options (size, color, qty)",
              touchpoints: ["Website", "Mobile App"],
              painPoints: ["Unexpected price changes from browse to cart"],
              opportunities: ["Price-match guarantee messaging"],
              metrics: { name: "Cart Add Rate", value: "22%" },
              supportReliance: "light"
            },
            {
              id: "checkout",
              label: "Checkout & Payment",
              owner: { name: "Product", color: "#013D5B" },
              collaborators: [
                { name: "Support", color: "#0C4A69" },
                { name: "Logistics", color: "#7A9A01" }
              ],
              emotion: { score: 0.35, label: "Frustrated", annotation: "Checkout is long, confusing, and asks for too much info" },
              needs: "Fast, simple checkout with minimal steps",
              actions: "Enters shipping info, payment details, applies promo codes",
              touchpoints: ["Website", "Mobile App"],
              painPoints: ["Too many form fields and steps", "Promo code failures", "Forced account creation"],
              opportunities: ["One-click checkout for returning customers", "Guest checkout improvements"],
              metrics: { name: "Cart Abandonment", value: "69%" },
              supportReliance: "medium"
            },
            {
              id: "confirmation",
              label: "Order Confirmation",
              owner: { name: "Product", color: "#013D5B" },
              collaborators: [
                { name: "Marketing", color: "#805AA1" },
                { name: "Logistics", color: "#7A9A01" }
              ],
              emotion: { score: 0.8, label: "Relieved", annotation: "Purchase complete, confirmation received" },
              needs: "Clear order summary and estimated delivery date",
              actions: "Reviews confirmation page, checks email",

              supportReliance: "light"
            }
          ]
        },
        {
          id: "delivery",
          label: "Delivery",
          icon: "\uD83D\uDE9A",
          color: "#7A9A01",
          steps: [
            {
              id: "tracking",
              label: "Order Tracking",
              owner: { name: "Logistics", color: "#7A9A01" },
              collaborators: [
                { name: "Support", color: "#0C4A69" }
              ],
              emotion: { score: 0.55, label: "Anxious", annotation: "Wants real-time updates, tracking is vague" },
              needs: "Accurate, real-time delivery tracking with ETA",
              actions: "Checks tracking page repeatedly, looks for status updates",
              touchpoints: ["Website", "Mobile App", "Email"],

              supportReliance: "medium"
            },
            {
              id: "receive",
              label: "Receive Package",
              owner: { name: "Logistics", color: "#7A9A01" },
              collaborators: [
                { name: "Support", color: "#0C4A69" }
              ],
              emotion: { score: 0.4, label: "Disappointed", annotation: "Package arrived late or in poor condition" },
              needs: "On-time delivery in good condition with easy access",
              actions: "Waits at home, checks doorstep, inspects package",
              touchpoints: ["Mobile App", "Phone"],
              painPoints: ["Delivery delays without proactive communication", "Package left in unsafe location"],
              opportunities: ["Proactive delay notifications with new ETA", "Delivery photo confirmation"],
              metrics: { name: "On-Time Delivery", value: "78%" },
              supportReliance: "heavy"
            }
          ]
        },
        {
          id: "post-purchase",
          label: "Post-Purchase",
          icon: "\u2B50",
          color: "#8A7515",
          steps: [
            {
              id: "unbox-use",
              label: "Unbox & Use",
              owner: { name: "Product", color: "#013D5B" },
              collaborators: [
                { name: "Support", color: "#0C4A69" }
              ],
              emotion: { score: 0.7, label: "Satisfied", annotation: "Product matches expectations, setup is straightforward" },
              needs: "Clear setup instructions and product matches listing",
              actions: "Unboxes product, follows setup guide, starts using",
              touchpoints: ["Email", "Mobile App"],
              painPoints: ["Product slightly different from online photos"],
              opportunities: ["AR preview before purchase, in-box QR for video guides"],
              metrics: { name: "Setup Completion", value: "89%" },
              supportReliance: "medium"
            },
            {
              id: "return-support",
              label: "Returns & Support",
              owner: { name: "Support", color: "#0C4A69" },
              collaborators: [
                { name: "Logistics", color: "#7A9A01" },
                { name: "Product", color: "#013D5B" }
              ],
              emotion: { score: 0.3, label: "Frustrated", annotation: "Return process is unclear, long wait for refund" },
              needs: "Hassle-free returns with clear refund timeline",
              actions: "Initiates return, prints label, ships back, waits for refund",
              touchpoints: ["Website", "Phone", "Email"],
              painPoints: ["Complicated return process", "Long refund processing time"],
              opportunities: ["Instant refund on drop-off", "Prepaid return labels in box"],
              metrics: { name: "Return Rate", value: "12%" },
              supportReliance: "heavy"
            },
            {
              id: "review-loyalty",
              label: "Review & Loyalty",
              owner: { name: "Marketing", color: "#805AA1" },
              collaborators: [
                { name: "Product", color: "#013D5B" }
              ],
              emotion: { score: 0.65, label: "Engaged", annotation: "Willing to leave review if prompted at right time" },
              needs: "Easy review submission and loyalty rewards",
              actions: "Leaves review, enrolls in loyalty program, browses again",
              touchpoints: ["Email", "Website", "Mobile App"],
              painPoints: ["Review prompts too early or too late"],
              opportunities: ["Loyalty points for reviews, personalized recommendations"],
              metrics: { name: "Review Rate", value: "8%" },
              supportReliance: "light"
            }
          ]
        }
      ],
      roles: [
        { name: "Marketing", abbrev: "MKT", color: "#805AA1" },
        { name: "Product", abbrev: "PRD", color: "#013D5B" },
        { name: "Support", abbrev: "SUP", color: "#0C4A69" },
        { name: "Logistics", abbrev: "LOG", color: "#7A9A01" }
      ]
    };

    // ─── Flatten all steps ───
    const allSteps = journeyData.phases.flatMap(p => p.steps);
    const totalSteps = allSteps.length;
    const colWidth = 180;
    const rowLabelWidth = 140;

    // ─── Dimension rows to render ───
    const dimensions = [
      { id: "owner", label: "Owner" },
      { id: "collaborators", label: "Collaborators" },
      { id: "emotion", label: "Sentiment" },
      { id: "needs", label: "Unmet Needs" },
      { id: "actions", label: "Actions" },
      { id: "touchpoints", label: "Touchpoints" },
      { id: "painPoints", label: "Pain Points" },
      { id: "opportunities", label: "Opportunities" },
      { id: "metrics", label: "Metrics" },
      { id: "supportReliance", label: "Support Reliance" }
    ];

    // ─── Role filter state ───
    let activeRoleFilter = null;

    // ─── Build Grid ───
    const grid = document.getElementById('journeyGrid');
    const gridTemplateColumns = `${rowLabelWidth}px ` + allSteps.map(() => `${colWidth}px`).join(' ');
    grid.style.gridTemplateColumns = gridTemplateColumns;

    // ─── Tooltip ───
    const tooltip = document.getElementById('tooltip');
    function showTooltip(e, html) {
      tooltip.innerHTML = html;
      tooltip.classList.add('visible');
      const x = Math.min(e.clientX + 12, window.innerWidth - 270);
      const y = Math.min(e.clientY + 12, window.innerHeight - 120);
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }
    function hideTooltip() {
      tooltip.classList.remove('visible');
    }

    // ─── Helper: create element with classes ───
    function el(tag, classes, text) {
      const e = document.createElement(tag);
      if (classes) e.className = classes;
      if (text) e.textContent = text;
      return e;
    }

    // ─── Helper: get step's phase color ───
    function getPhaseColorForStep(stepId) {
      for (const phase of journeyData.phases) {
        for (const step of phase.steps) {
          if (step.id === stepId) return phase.color;
        }
      }
      return '#6B6760';
    }

    // ─── Helper: detect if step is first in a new phase ───
    function isFirstOfPhase(globalIndex) {
      let count = 0;
      for (const phase of journeyData.phases) {
        if (count === globalIndex) return true;
        count += phase.steps.length;
      }
      return false;
    }

    // ─── Row 1: Phase Headers ───
    const phaseRowLabel = el('div', 'row-label phase-label-row', 'Phase');
    phaseRowLabel.style.height = '44px';
    grid.appendChild(phaseRowLabel);

    journeyData.phases.forEach((phase, pi) => {
      const header = el('div', 'phase-header');
      header.style.background = phase.color;
      header.style.gridColumn = `span ${phase.steps.length}`;
      if (pi === 0) header.style.borderTopLeftRadius = '0';

      const icon = el('span', 'phase-icon', phase.icon);
      header.appendChild(icon);
      header.appendChild(document.createTextNode(phase.label));

      header.addEventListener('click', () => {
        header.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      });

      grid.appendChild(header);
    });

    // ─── Row 2: Step Headers ───
    const stepRowLabel = el('div', 'row-label', 'Step');
    stepRowLabel.style.height = '32px';
    grid.appendChild(stepRowLabel);

    let stepGlobalIndex = 0;
    journeyData.phases.forEach(phase => {
      phase.steps.forEach((step, si) => {
        const stepHeader = el('div', 'step-header', step.label);
        if (si === 0 && journeyData.phases.indexOf(phase) > 0) {
          stepHeader.classList.add('phase-separator');
        }
        stepHeader.style.borderBottom = `2px solid ${phase.color}`;
        grid.appendChild(stepHeader);
        stepGlobalIndex++;
      });
    });

    // ─── Content Rows ───
    dimensions.forEach(dim => {
      // Row label
      const label = el('div', 'row-label', dim.label);
      if (dim.id === 'emotion') label.style.height = '120px';
      grid.appendChild(label);

      if (dim.id === 'emotion') {
        // Emotion row: single cell spanning all steps
        const emotionCell = el('div', 'cell emotion-row-cell');
        emotionCell.style.gridColumn = `span ${totalSteps}`;
        emotionCell.id = 'emotion-row';
        grid.appendChild(emotionCell);
        return;
      }

      let gi = 0;
      journeyData.phases.forEach((phase, pi) => {
        phase.steps.forEach((step, si) => {
          const cell = el('div', 'cell');
          cell.dataset.stepId = step.id;
          cell.dataset.role = step.owner.name;
          // Phase separator
          if (si === 0 && pi > 0) cell.classList.add('phase-separator');
          // Subtle phase tint
          cell.style.background = `rgba(${hexToRgb(phase.color)}, 0.03)`;

          switch (dim.id) {
            case 'owner': {
              const badges = el('div', 'role-badges');
              badges.appendChild(createRoleBadge(step.owner.name, step.owner.color));
              cell.appendChild(badges);
              cell.style.minHeight = '48px';
              break;
            }
            case 'collaborators': {
              const badges = el('div', 'role-badges');
              if (step.collaborators && step.collaborators.length) {
                step.collaborators.forEach(c => {
                  badges.appendChild(createRoleBadge(c.name, c.color));
                });
              } else {
                cell.classList.add('empty-cell');
                cell.textContent = '\u2014';
              }
              cell.appendChild(badges);
              cell.style.minHeight = '48px';
              break;
            }
            case 'needs': {
              cell.classList.add('need-cell');
              const t = el('span', 'need-text', step.needs || '\u2014');
              cell.appendChild(t);
              if (!step.needs) cell.classList.add('empty-cell');
              break;
            }
            case 'actions': {
              cell.textContent = step.actions || '\u2014';
              if (!step.actions) cell.classList.add('empty-cell');
              break;
            }
            case 'touchpoints': {
              const list = el('div', 'touchpoint-list');
              const iconMap = {
                'Website': '\uD83D\uDCBB',
                'Mobile App': '\uD83D\uDCF1',
                'Email': '\u2709\uFE0F',
                'Phone': '\uD83D\uDCDE',
                'SMS': '\uD83D\uDCAC',
                'Social Media': '\uD83D\uDCE3'
              };
              (step.touchpoints || []).forEach(tp => {
                const item = el('span', 'touchpoint-item');
                const icon = el('span', 'touchpoint-icon', iconMap[tp] || '\uD83D\uDD17');
                item.appendChild(icon);
                item.appendChild(document.createTextNode(tp));
                list.appendChild(item);
              });
              cell.appendChild(list);
              if (!step.touchpoints || !step.touchpoints.length) {
                cell.classList.add('empty-cell');
                cell.textContent = '\u2014';
              }
              break;
            }
            case 'painPoints': {
              cell.classList.add('pain-point-cell');
              if (step.painPoints && step.painPoints.length) {
                step.painPoints.forEach(pp => {
                  const t = el('span', 'pain-point-text');
                  t.innerHTML = '<span class="pain-marker">\u26A0\uFE0F</span>' + pp;
                  cell.appendChild(t);
                });
              } else {
                cell.classList.remove('pain-point-cell');
                cell.classList.add('empty-cell');
                cell.textContent = '\u2014';
              }
              break;
            }
            case 'opportunities': {
              cell.classList.add('opportunity-cell');
              if (step.opportunities && step.opportunities.length) {
                step.opportunities.forEach(op => {
                  const t = el('span', 'opportunity-text');
                  t.innerHTML = '\uD83D\uDCA1 ' + op;
                  cell.appendChild(t);
                });
              } else {
                cell.classList.remove('opportunity-cell');
                cell.classList.add('empty-cell');
                cell.textContent = '\u2014';
              }
              break;
            }
            case 'metrics': {
              if (step.metrics) {
                const card = el('div', 'metric-card');
                const val = el('span', 'metric-value', step.metrics.value);
                val.style.color = phase.color;
                const name = el('span', 'metric-name', step.metrics.name);
                card.appendChild(val);
                card.appendChild(name);
                cell.appendChild(card);
              } else {
                cell.classList.add('empty-cell');
                cell.textContent = '\u2014';
              }
              break;
            }
            case 'supportReliance': {
              const wrapper = el('div', 'support-bar-wrapper');
              const bar = el('div', 'support-bar');
              const level = step.supportReliance || 'light';
              const colorMap = { heavy: '#1C1A17', medium: '#54514D', light: '#B0ABA2' };
              const widthMap = { heavy: '100%', medium: '60%', light: '30%' };
              bar.style.background = '#EBE6DD';
              const fill = el('div', '');
              fill.style.height = '100%';
              fill.style.width = widthMap[level];
              fill.style.background = colorMap[level];
              fill.style.borderRadius = '4px';
              bar.appendChild(fill);
              wrapper.appendChild(bar);
              const lbl = el('span', 'support-label', level.charAt(0).toUpperCase() + level.slice(1));
              wrapper.appendChild(lbl);
              cell.appendChild(wrapper);
              break;
            }
          }

          // Hover highlight
          cell.addEventListener('mouseenter', function(e) {
            if (dim.id !== 'emotion') {
              this.style.background = 'rgba(1, 61, 91, 0.05)';
            }
          });
          cell.addEventListener('mouseleave', function(e) {
            if (dim.id !== 'emotion') {
              this.style.background = `rgba(${hexToRgb(phase.color)}, 0.03)`;
            }
          });

          grid.appendChild(cell);
          gi++;
        });
      });
    });

    // ─── Role Badge Factory ───
    function createRoleBadge(name, color) {
      const badge = el('span', 'role-badge', name);
      const rgb = hexToRgb(color);
      badge.style.background = `rgba(${rgb}, 0.12)`;
      badge.style.color = color;
      badge.style.border = `1px solid rgba(${rgb}, 0.25)`;
      badge.dataset.roleName = name;

      badge.addEventListener('click', (e) => {
        e.stopPropagation();
        if (activeRoleFilter === name) {
          activeRoleFilter = null;
          clearRoleHighlight();
        } else {
          activeRoleFilter = name;
          highlightRole(name);
        }
      });

      return badge;
    }

    function highlightRole(roleName) {
      // Reset all badges
      document.querySelectorAll('.role-badge').forEach(b => {
        b.classList.remove('active-filter');
        if (b.dataset.roleName === roleName) {
          b.classList.add('active-filter');
        }
      });
      // Highlight columns
      document.querySelectorAll('.cell[data-step-id]').forEach(c => {
        const step = allSteps.find(s => s.id === c.dataset.stepId);
        if (!step) return;
        const involved = step.owner.name === roleName ||
          (step.collaborators && step.collaborators.some(col => col.name === roleName));
        if (!involved) {
          c.style.opacity = '0.4';
        } else {
          c.style.opacity = '1';
        }
      });
    }

    function clearRoleHighlight() {
      document.querySelectorAll('.role-badge').forEach(b => b.classList.remove('active-filter'));
      document.querySelectorAll('.cell[data-step-id]').forEach(c => {
        c.style.opacity = '1';
      });
    }

    // ─── Emotion Curve (D3) ───
    const emotionRow = document.getElementById('emotion-row');
    const emotionWidth = totalSteps * colWidth;
    const emotionHeight = 110;

    const emotionSvg = d3.select('#emotion-row')
      .append('svg')
      .attr('width', emotionWidth)
      .attr('height', emotionHeight)
      .style('display', 'block');

    // Background bands
    const bandData = [
      { y: 0, h: emotionHeight / 3, color: 'rgba(122,154,1, 0.05)' },
      { y: emotionHeight / 3, h: emotionHeight / 3, color: 'rgba(12,74,105, 0.05)' },
      { y: 2 * emotionHeight / 3, h: emotionHeight / 3, color: 'rgba(207,98,83, 0.05)' }
    ];
    emotionSvg.selectAll('.band')
      .data(bandData)
      .join('rect')
      .attr('x', 0)
      .attr('y', d => d.y)
      .attr('width', emotionWidth)
      .attr('height', d => d.h)
      .attr('fill', d => d.color);

    // Band labels
    const bandLabels = [
      { text: 'Positive', y: emotionHeight / 6 },
      { text: 'Neutral', y: emotionHeight / 2 },
      { text: 'Negative', y: 5 * emotionHeight / 6 }
    ];
    emotionSvg.selectAll('.band-label')
      .data(bandLabels)
      .join('text')
      .attr('x', 8)
      .attr('y', d => d.y + 4)
      .attr('fill', '#B0ABA2')
      .attr('font-size', '9px')
      .attr('font-family', '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif')
      .text(d => d.text);

    // Scales
    const xScale = d3.scaleLinear()
      .domain([0, totalSteps - 1])
      .range([colWidth / 2, emotionWidth - colWidth / 2]);

    const yScale = d3.scaleLinear()
      .domain([0, 1])
      .range([emotionHeight - 15, 20]);

    // Line
    const line = d3.line()
      .x((d, i) => xScale(i))
      .y(d => yScale(d.emotion.score))
      .curve(d3.curveMonotoneX);

    // Gradient definition
    const defs = emotionSvg.append('defs');
    const gradient = defs.append('linearGradient')
      .attr('id', 'emotionGradient')
      .attr('x1', '0%').attr('y1', '0%')
      .attr('x2', '100%').attr('y2', '0%');

    allSteps.forEach((step, i) => {
      const pct = (i / (totalSteps - 1)) * 100;
      const color = step.emotion.score > 0.6 ? '#7A9A01'
        : step.emotion.score > 0.3 ? '#0C4A69' : '#CF6253';
      gradient.append('stop')
        .attr('offset', pct + '%')
        .attr('stop-color', color);
    });

    // Draw line
    emotionSvg.append('path')
      .datum(allSteps)
      .attr('d', line)
      .attr('fill', 'none')
      .attr('stroke', 'url(#emotionGradient)')
      .attr('stroke-width', 2.5)
      .attr('stroke-linecap', 'round');

    // Draw data points
    emotionSvg.selectAll('.emotion-dot')
      .data(allSteps)
      .join('circle')
      .attr('class', 'emotion-dot')
      .attr('cx', (d, i) => xScale(i))
      .attr('cy', d => yScale(d.emotion.score))
      .attr('r', 5)
      .attr('fill', d => d.emotion.score > 0.6 ? '#7A9A01'
        : d.emotion.score > 0.3 ? '#0C4A69' : '#CF6253')
      .attr('stroke', '#fff')
      .attr('stroke-width', 2)
      .style('cursor', 'pointer')
      .on('mouseenter', function(event, d) {
        d3.select(this).transition().duration(150).attr('r', 8);
        const emoji = d.emotion.score > 0.6 ? '\uD83D\uDE0A' : d.emotion.score > 0.3 ? '\uD83D\uDE10' : '\uD83D\uDE1E';
        showTooltip(event, `
          <div class="tooltip-title">${emoji} ${d.label} — ${d.emotion.label}</div>
          <div>${d.emotion.annotation}</div>
          <div class="tooltip-score">Score: ${(d.emotion.score * 100).toFixed(0)}%</div>
        `);
      })
      .on('mousemove', function(event) {
        tooltip.style.left = (event.clientX + 12) + 'px';
        tooltip.style.top = (event.clientY + 12) + 'px';
      })
      .on('mouseleave', function() {
        d3.select(this).transition().duration(150).attr('r', 5);
        hideTooltip();
      });

    // Emoji markers above dots
    emotionSvg.selectAll('.emotion-emoji')
      .data(allSteps)
      .join('text')
      .attr('x', (d, i) => xScale(i))
      .attr('y', d => yScale(d.emotion.score) - 14)
      .attr('text-anchor', 'middle')
      .attr('font-size', '14px')
      .text(d => d.emotion.score > 0.6 ? '\uD83D\uDE0A' : d.emotion.score > 0.3 ? '\uD83D\uDE10' : '\uD83D\uDE1E');

    // Phase separators on emotion SVG
    let stepCount = 0;
    journeyData.phases.forEach((phase, pi) => {
      if (pi > 0) {
        const sepX = xScale(stepCount) - colWidth / 2;
        emotionSvg.append('line')
          .attr('x1', sepX).attr('y1', 0)
          .attr('x2', sepX).attr('y2', emotionHeight)
          .attr('stroke', '#D0CBC3')
          .attr('stroke-width', 1)
          .attr('stroke-dasharray', '3,3');
      }
      stepCount += phase.steps.length;
    });

    // ─── Legend ───
    const legend = document.getElementById('legend');
    const legendTitle = el('span', 'legend-item', 'Teams:');
    legendTitle.style.fontWeight = '600';
    legendTitle.style.color = '#54514D';
    legend.appendChild(legendTitle);
    journeyData.roles.forEach(role => {
      const item = el('div', 'legend-item');
      const swatch = el('div', 'legend-swatch');
      swatch.style.background = role.color;
      item.appendChild(swatch);
      item.appendChild(document.createTextNode(role.name));
      legend.appendChild(item);
    });

    // Sentiment legend
    const sentTitle = el('span', 'legend-item', '');
    sentTitle.style.borderLeft = '1px solid #D0CBC3';
    sentTitle.style.paddingLeft = '16px';
    sentTitle.style.marginLeft = '4px';
    sentTitle.textContent = 'Sentiment:';
    sentTitle.style.fontWeight = '600';
    sentTitle.style.color = '#54514D';
    legend.appendChild(sentTitle);
    [
      { label: 'Positive', color: '#7A9A01' },
      { label: 'Neutral', color: '#0C4A69' },
      { label: 'Negative', color: '#CF6253' }
    ].forEach(s => {
      const item = el('div', 'legend-item');
      const swatch = el('div', 'legend-swatch');
      swatch.style.background = s.color;
      swatch.style.borderRadius = '50%';
      item.appendChild(swatch);
      item.appendChild(document.createTextNode(s.label));
      legend.appendChild(item);
    });

    // ─── Scroll shadow on sticky labels ───
    const wrapper = document.getElementById('gridWrapper');
    wrapper.addEventListener('scroll', () => {
      if (wrapper.scrollLeft > 0) {
        wrapper.classList.add('scrolled');
      } else {
        wrapper.classList.remove('scrolled');
      }
    });

    // ─── Utility: hex to rgb string ───
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `${r},${g},${b}`;
    }
  </script>
</body>
</html>
