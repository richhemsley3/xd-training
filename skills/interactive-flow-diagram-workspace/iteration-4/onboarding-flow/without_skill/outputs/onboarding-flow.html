<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Onboarding Flow</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0f1117;
    color: #e1e4ea;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 32px 48px 0;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }

  header p {
    font-size: 14px;
    color: #7a7f8e;
    margin-top: 4px;
  }

  #canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Detail panel */
  #detail-panel {
    position: fixed;
    right: -420px;
    top: 0;
    width: 400px;
    height: 100%;
    background: #1a1c25;
    border-left: 1px solid #2a2d38;
    padding: 40px 32px;
    transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 100;
    overflow-y: auto;
  }

  #detail-panel.open {
    right: 0;
  }

  #detail-panel .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid #2a2d38;
    background: transparent;
    color: #7a7f8e;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }

  #detail-panel .close-btn:hover {
    background: #2a2d38;
    color: #e1e4ea;
  }

  #detail-panel .step-number {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 8px;
  }

  #detail-panel h2 {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 16px;
  }

  #detail-panel .description {
    font-size: 14px;
    line-height: 1.7;
    color: #9a9fb0;
    margin-bottom: 24px;
  }

  #detail-panel .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #5a5f70;
    margin-bottom: 12px;
  }

  #detail-panel .feature-list {
    list-style: none;
    margin-bottom: 28px;
  }

  #detail-panel .feature-list li {
    font-size: 13px;
    color: #b0b5c5;
    padding: 8px 0;
    border-bottom: 1px solid #22242e;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  #detail-panel .feature-list li .bullet {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }

  #detail-panel .meta-row {
    display: flex;
    gap: 16px;
    margin-bottom: 8px;
  }

  #detail-panel .meta-item {
    background: #22242e;
    border-radius: 8px;
    padding: 12px 16px;
    flex: 1;
  }

  #detail-panel .meta-item .label {
    font-size: 11px;
    color: #5a5f70;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }

  #detail-panel .meta-item .value {
    font-size: 14px;
    font-weight: 500;
    color: #e1e4ea;
  }

  /* Overlay */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  #overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* Node tooltip on hover */
  .node-tooltip {
    position: absolute;
    background: #22242e;
    border: 1px solid #2a2d38;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: #9a9fb0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
    z-index: 50;
  }

  .node-tooltip.visible {
    opacity: 1;
  }
</style>
</head>
<body>

<header>
  <h1>User Onboarding Flow</h1>
  <p>Click any step to view screen details</p>
</header>

<div id="canvas-container">
  <svg id="flow-svg"></svg>
</div>

<div id="overlay" onclick="closePanel()"></div>

<div id="detail-panel">
  <button class="close-btn" onclick="closePanel()">&times;</button>
  <div id="panel-content"></div>
</div>

<div class="node-tooltip" id="tooltip"></div>

<script>
const steps = [
  {
    id: 'welcome',
    label: 'Welcome',
    icon: '\u{1F44B}',
    color: '#6366f1',
    stepNum: 1,
    description: 'The entry point of the onboarding experience. Users are greeted with a warm welcome message, a brief overview of the product\'s value proposition, and a clear call-to-action to begin setup.',
    features: [
      'Animated welcome illustration or product logo',
      'Brief value proposition (2-3 bullet points)',
      'Primary CTA button: "Get Started"',
      'Option to skip onboarding for returning users',
      'Language / locale selector'
    ],
    duration: '~15 seconds',
    completionRate: '98%'
  },
  {
    id: 'profile',
    label: 'Profile Setup',
    icon: '\u{1F464}',
    color: '#8b5cf6',
    stepNum: 2,
    description: 'Users provide essential profile information. The form is kept minimal to reduce friction, collecting only what is needed to personalize the experience.',
    features: [
      'Display name and avatar upload',
      'Role selection (dropdown or pills)',
      'Company or team name (optional)',
      'Timezone auto-detection with manual override',
      'Form validation with inline feedback'
    ],
    duration: '~45 seconds',
    completionRate: '89%'
  },
  {
    id: 'connect',
    label: 'Connect Account',
    icon: '\u{1F517}',
    color: '#a855f7',
    stepNum: 3,
    description: 'Users connect external accounts or data sources. OAuth flows handle authentication securely, and users can skip this step to connect later from settings.',
    features: [
      'OAuth integration cards (Google, Slack, GitHub, etc.)',
      'Connection status indicators (connected / pending)',
      'Permission scope explanation for each service',
      'Skip option with reminder to connect later',
      'Error handling for failed auth attempts'
    ],
    duration: '~30 seconds',
    completionRate: '72%'
  },
  {
    id: 'tutorial',
    label: 'Tutorial',
    icon: '\u{1F393}',
    color: '#d946ef',
    stepNum: 4,
    description: 'A brief interactive walkthrough highlights key product features. Users engage with guided tooltips or a short video to understand core workflows.',
    features: [
      'Step-by-step tooltip walkthrough (3-5 highlights)',
      'Interactive sandbox with sample data',
      'Short explainer video option (< 90 seconds)',
      'Progress indicator showing tutorial completion',
      'Option to replay or skip individual steps'
    ],
    duration: '~2 minutes',
    completionRate: '64%'
  },
  {
    id: 'dashboard',
    label: 'Dashboard',
    icon: '\u{1F4CA}',
    color: '#ec4899',
    stepNum: 5,
    description: 'The user lands on their personalized dashboard. A checklist widget shows remaining setup tasks, and contextual nudges encourage further engagement.',
    features: [
      'Personalized greeting with user\'s name',
      'Onboarding checklist widget (remaining tasks)',
      'Quick-start action cards for common workflows',
      'Sample / demo data pre-populated for exploration',
      'Dismissible contextual tips and nudges'
    ],
    duration: 'Ongoing',
    completionRate: '100%'
  }
];

const svg = d3.select('#flow-svg');
const container = document.getElementById('canvas-container');
const tooltip = document.getElementById('tooltip');

function render() {
  const width = container.clientWidth;
  const height = container.clientHeight;

  svg.attr('viewBox', `0 0 ${width} ${height}`);
  svg.selectAll('*').remove();

  const defs = svg.append('defs');

  // Glow filter
  const glow = defs.append('filter').attr('id', 'glow').attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
  glow.append('feGaussianBlur').attr('stdDeviation', '8').attr('result', 'blur');
  glow.append('feMerge').selectAll('feMergeNode').data(['blur', 'SourceGraphic']).enter().append('feMergeNode').attr('in', d => d);

  // Arrow marker
  defs.append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '0 0 10 7')
    .attr('refX', 10)
    .attr('refY', 3.5)
    .attr('markerWidth', 10)
    .attr('markerHeight', 7)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,0 L10,3.5 L0,7 Z')
    .attr('fill', '#3a3d4a');

  // Layout
  const nodeW = 160;
  const nodeH = 72;
  const paddingX = 80;
  const totalW = steps.length * nodeW + (steps.length - 1) * paddingX;
  const startX = (width - totalW) / 2;
  const cy = height / 2;

  const positions = steps.map((s, i) => ({
    x: startX + i * (nodeW + paddingX),
    y: cy - nodeH / 2,
    cx: startX + i * (nodeW + paddingX) + nodeW / 2,
    cy: cy
  }));

  // Draw connectors
  for (let i = 0; i < positions.length - 1; i++) {
    const from = positions[i];
    const to = positions[i + 1];
    const x1 = from.x + nodeW;
    const x2 = to.x;
    const midX = (x1 + x2) / 2;

    svg.append('path')
      .attr('d', `M${x1},${cy} C${midX},${cy} ${midX},${cy} ${x2},${cy}`)
      .attr('fill', 'none')
      .attr('stroke', '#2a2d38')
      .attr('stroke-width', 2)
      .attr('marker-end', 'url(#arrowhead)');

    // Animated dot along path
    const path = svg.append('path')
      .attr('d', `M${x1},${cy} C${midX},${cy} ${midX},${cy} ${x2},${cy}`)
      .attr('fill', 'none')
      .attr('stroke', 'none');

    const dot = svg.append('circle')
      .attr('r', 3)
      .attr('fill', steps[i].color)
      .attr('opacity', 0.6);

    function animateDot() {
      dot.transition()
        .duration(2000)
        .delay(i * 400)
        .ease(d3.easeLinear)
        .attrTween('cx', () => t => path.node().getPointAtLength(t * path.node().getTotalLength()).x)
        .attrTween('cy', () => t => path.node().getPointAtLength(t * path.node().getTotalLength()).y)
        .on('end', () => {
          dot.attr('opacity', 0);
          setTimeout(() => {
            dot.attr('opacity', 0.6);
            animateDot();
          }, (steps.length - i) * 400 + 1000);
        });
    }
    animateDot();
  }

  // Draw nodes
  const nodeGroups = svg.selectAll('.node-group')
    .data(steps)
    .enter()
    .append('g')
    .attr('class', 'node-group')
    .attr('transform', (d, i) => `translate(${positions[i].x}, ${positions[i].y})`)
    .style('cursor', 'pointer');

  // Node background with subtle gradient
  nodeGroups.each(function(d, i) {
    const g = d3.select(this);
    const gradId = `grad-${d.id}`;

    defs.append('linearGradient')
      .attr('id', gradId)
      .attr('x1', '0%').attr('y1', '0%')
      .attr('x2', '100%').attr('y2', '100%')
      .selectAll('stop')
      .data([
        { offset: '0%', color: d.color, opacity: 0.12 },
        { offset: '100%', color: d.color, opacity: 0.04 }
      ])
      .enter().append('stop')
      .attr('offset', s => s.offset)
      .attr('stop-color', s => s.color)
      .attr('stop-opacity', s => s.opacity);

    // Glow behind
    g.append('rect')
      .attr('width', nodeW)
      .attr('height', nodeH)
      .attr('rx', 16)
      .attr('fill', d.color)
      .attr('opacity', 0.08)
      .attr('filter', 'url(#glow)');

    // Main rect
    g.append('rect')
      .attr('width', nodeW)
      .attr('height', nodeH)
      .attr('rx', 16)
      .attr('fill', `url(#${gradId})`)
      .attr('stroke', d.color)
      .attr('stroke-opacity', 0.25)
      .attr('stroke-width', 1.5)
      .attr('class', 'node-rect');

    // Step number badge
    g.append('circle')
      .attr('cx', 24)
      .attr('cy', 20)
      .attr('r', 11)
      .attr('fill', d.color)
      .attr('opacity', 0.2);

    g.append('text')
      .attr('x', 24)
      .attr('y', 24)
      .attr('text-anchor', 'middle')
      .attr('font-size', 11)
      .attr('font-weight', 600)
      .attr('fill', d.color)
      .text(d.stepNum);

    // Label
    g.append('text')
      .attr('x', nodeW / 2)
      .attr('y', 50)
      .attr('text-anchor', 'middle')
      .attr('font-size', 14)
      .attr('font-weight', 500)
      .attr('fill', '#e1e4ea')
      .text(d.label);
  });

  // Hover & Click
  nodeGroups
    .on('mouseenter', function(event, d) {
      d3.select(this).select('.node-rect')
        .transition().duration(150)
        .attr('stroke-opacity', 0.6)
        .attr('stroke-width', 2);

      tooltip.textContent = `Click to view ${d.label} details`;
      tooltip.classList.add('visible');
    })
    .on('mousemove', function(event) {
      tooltip.style.left = (event.pageX + 12) + 'px';
      tooltip.style.top = (event.pageY - 36) + 'px';
    })
    .on('mouseleave', function() {
      d3.select(this).select('.node-rect')
        .transition().duration(150)
        .attr('stroke-opacity', 0.25)
        .attr('stroke-width', 1.5);

      tooltip.classList.remove('visible');
    })
    .on('click', function(event, d) {
      tooltip.classList.remove('visible');
      openPanel(d);
    });
}

function openPanel(step) {
  const panel = document.getElementById('detail-panel');
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('panel-content');

  const featuresHtml = step.features.map(f =>
    `<li><span class="bullet" style="background:${step.color}"></span><span>${f}</span></li>`
  ).join('');

  content.innerHTML = `
    <div class="step-number" style="color:${step.color}">Step ${step.stepNum}</div>
    <h2>${step.label}</h2>
    <p class="description">${step.description}</p>
    <div class="meta-row">
      <div class="meta-item">
        <div class="label">Avg. Duration</div>
        <div class="value">${step.duration}</div>
      </div>
      <div class="meta-item">
        <div class="label">Completion</div>
        <div class="value">${step.completionRate}</div>
      </div>
    </div>
    <br>
    <div class="section-title">Screen Elements</div>
    <ul class="feature-list">${featuresHtml}</ul>
  `;

  panel.classList.add('open');
  overlay.classList.add('visible');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

// Initial render + resize
render();
window.addEventListener('resize', () => {
  render();
});
</script>

</body>
</html>
