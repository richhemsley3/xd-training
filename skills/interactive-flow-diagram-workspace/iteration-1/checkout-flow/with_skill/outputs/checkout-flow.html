<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce Checkout — Interactive Flow</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --sds-interactive-primary: #013D5B;
      --sds-text-primary: #1C1A17;
      --sds-text-secondary: #6B6560;
      --sds-border-default: #E0DCD3;
      --sds-bg-surface: #FFFFFF;
      --sds-bg-page: #F7F5F0;
      --sds-status-success-bg: #E8F5E9;
      --sds-status-success-border: #4CAF50;
      --sds-status-success-text: #2E7D32;
      --sds-status-error-bg: #FDECEA;
      --sds-status-error-border: #F44336;
      --sds-status-error-text: #C62828;
      --sds-status-warning-bg: #FFF8E1;
      --sds-status-warning-border: #FF9800;
      --sds-status-warning-text: #E65100;
      --sds-status-info-bg: #E3F2FD;
      --sds-status-info-border: #2196F3;
      --sds-status-info-text: #1565C0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--sds-bg-page);
      color: var(--sds-text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #breadcrumb {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: var(--sds-bg-surface);
      border-bottom: 1px solid var(--sds-border-default);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
      font-size: 14px;
      gap: 8px;
    }

    #breadcrumb .crumb {
      cursor: pointer;
      color: var(--sds-interactive-primary);
      font-weight: 500;
    }

    #breadcrumb .crumb:hover { text-decoration: underline; }
    #breadcrumb .separator { color: var(--sds-text-secondary); }
    #breadcrumb .current { color: var(--sds-text-primary); font-weight: 600; cursor: default; }

    #title-bar {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--sds-interactive-primary);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 99;
      color: white;
    }

    #title-bar h1 { font-size: 18px; font-weight: 600; }
    #title-bar .subtitle { font-size: 13px; opacity: 0.8; margin-left: 16px; }

    #canvas {
      position: fixed;
      top: 104px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #canvas svg { width: 100%; height: 100%; }

    /* Detail sidebar */
    #detail-panel {
      position: fixed;
      top: 104px;
      right: -420px;
      width: 420px;
      bottom: 0;
      background: var(--sds-bg-surface);
      border-left: 1px solid var(--sds-border-default);
      z-index: 200;
      transition: right 0.3s ease;
      overflow-y: auto;
      box-shadow: -4px 0 16px rgba(0,0,0,0.08);
    }

    #detail-panel.open { right: 0; }

    #detail-panel .panel-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--sds-border-default);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    #detail-panel .panel-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--sds-text-primary);
    }

    #detail-panel .panel-header .node-type-badge {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
      margin-top: 6px;
      display: inline-block;
    }

    #detail-panel .close-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sds-text-secondary);
      flex-shrink: 0;
    }

    #detail-panel .close-btn:hover { background: var(--sds-bg-page); }

    #detail-panel .panel-section {
      padding: 16px 24px;
      border-bottom: 1px solid var(--sds-border-default);
    }

    #detail-panel .panel-section:last-child { border-bottom: none; }

    #detail-panel .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--sds-text-secondary);
      font-weight: 600;
      margin-bottom: 8px;
    }

    #detail-panel .section-content {
      font-size: 14px;
      line-height: 1.6;
      color: var(--sds-text-primary);
    }

    #detail-panel .edge-case-item {
      padding: 8px 12px;
      background: var(--sds-status-warning-bg);
      border-left: 3px solid var(--sds-status-warning-border);
      border-radius: 0 4px 4px 0;
      margin-bottom: 6px;
      font-size: 13px;
    }

    #detail-panel .exit-item {
      padding: 8px 12px;
      background: var(--sds-bg-page);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #detail-panel .exit-arrow {
      color: var(--sds-interactive-primary);
      font-weight: 600;
    }

    /* Minimap */
    #minimap {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 180px;
      height: 120px;
      background: var(--sds-bg-surface);
      border: 1px solid var(--sds-border-default);
      border-radius: 8px;
      z-index: 50;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: none;
    }

    #minimap svg { width: 100%; height: 100%; }

    #minimap .viewport-rect {
      fill: rgba(1, 61, 91, 0.1);
      stroke: var(--sds-interactive-primary);
      stroke-width: 1.5;
    }

    /* Legend */
    #legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: var(--sds-bg-surface);
      border: 1px solid var(--sds-border-default);
      border-radius: 8px;
      padding: 12px 16px;
      z-index: 50;
      font-size: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: none;
    }

    #legend .legend-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sds-text-secondary);
    }

    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    #legend .legend-swatch {
      width: 24px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid var(--sds-border-default);
      flex-shrink: 0;
    }

    /* Overlay for closing detail panel */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 150;
      display: none;
    }

    #overlay.active { display: block; }
  </style>
</head>
<body>
  <div id="breadcrumb">
    <span class="current" id="bc-overview">E-Commerce Checkout Flow</span>
  </div>

  <div id="title-bar">
    <h1>E-Commerce Checkout Flow</h1>
    <span class="subtitle">Browse &rarr; Cart &rarr; Shipping &rarr; Payment &rarr; Confirmation</span>
  </div>

  <div id="canvas"></div>

  <div id="overlay" onclick="closeDetailPanel()"></div>

  <div id="detail-panel">
    <div class="panel-header">
      <div>
        <h2 id="detail-title"></h2>
        <span class="node-type-badge" id="detail-badge"></span>
      </div>
      <button class="close-btn" onclick="closeDetailPanel()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="detail-body"></div>
  </div>

  <div id="minimap"><svg></svg></div>

  <div id="legend">
    <div class="legend-title">Legend</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#E8F5E9;border-color:#4CAF50"></div> Start / End</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fff;border-color:#E0DCD3"></div> Screen</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#FFF8E1;border-color:#FF9800;transform:rotate(45deg);width:12px;height:12px;margin:2px 8px 2px 6px"></div> Decision</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#FDECEA;border-left:3px solid #F44336"></div> Error</div>
    <div class="legend-item"><div class="legend-swatch" style="background:none;border:none;height:3px;background:var(--sds-interactive-primary);border-radius:2px"></div> Happy Path</div>
    <div class="legend-item"><div class="legend-swatch" style="background:none;border:none;height:1px;background:#aaa"></div> Alt Path</div>
  </div>

  <script>
    // ===== FLOW DATA =====
    const flowData = {

            {
              id: "add-to-cart",

              label: "Add to Cart",

              userAction: "Confirm item added, choose next action",

              edgeCases: ["Cart quantity limit reached", "Item became unavailable between page load and add action"],
              exits: [
                { to: "product-listing", label: "Continue Shopping" }
              ]
            }
          ],
          edges: [
            { from: "homepage", to: "product-listing", label: "Browse", isHappyPath: true },
            { from: "product-listing", to: "product-detail", label: "Select product", isHappyPath: true },
            { from: "product-detail", to: "add-to-cart", label: "Add to Cart", isHappyPath: true },
            { from: "add-to-cart", to: "product-listing", label: "Continue Shopping", isHappyPath: false },
            { from: "product-detail", to: "product-listing", label: "Back", isHappyPath: false }
          ]
        },
        {
          id: "cart",
          label: "Cart",
          description: "Review and manage cart items",
          icon: "shopping-cart",
          color: "#F4FAEB",

          nodes: [
            {
              id: "cart-view",
              type: "screen",

              userAction: "Review items, update quantities, remove items",

              edgeCases: ["Empty cart state", "Item price changed since added", "Item went out of stock", "Promo code invalid or expired"],
              exits: [

            },
            {

              type: "decision",
              label: "Guest or Account?",
              screenType: "form",
              userAction: "Choose to checkout as guest or sign in",
              description: "Decision point: user can sign in to an existing account, create a new account, or continue as guest.",
              edgeCases: ["Account locked", "OAuth provider unavailable", "Session expired during decision"],
              exits: [
                { to: "shipping-address", label: "Guest Checkout" },
                { to: "shipping-address", label: "Sign In / Create Account" }
              ]
            }
          ],
          edges: [
            { from: "cart-view", to: "checkout-start", label: "Checkout", isHappyPath: true },

            { from: "cart-view", to: "product-listing", label: "Continue Shopping", isHappyPath: false }
          ]
        },
        {
          id: "shipping",
          label: "Shipping",
          description: "Enter and validate shipping details",

            {

              screenType: "form",

              edgeCases: ["API timeout during validation", "Partial match requiring user confirmation"],
              exits: [
                { to: "shipping-method", label: "Yes - Valid" },
                { to: "address-error", label: "No - Invalid" }
              ]
            },
            {
              id: "address-error",
              type: "error",
              label: "Address Error",
              screenType: "form",
              userAction: "Review address error and correct input",

              exits: [
                { to: "shipping-address", label: "Edit Address" }
              ]
            },
            {
              id: "shipping-method",
              type: "screen",

          edges: [

            { from: "address-error", to: "shipping-address", label: "Edit", isHappyPath: false },

        },
        {

          description: "Enter payment and process transaction",

          borderColor: "#6B21A8",

    // ===== ICONS (inline SVG paths) =====
    const icons = {

    // ===== STATE =====
    let currentLevel = 1;
    let currentPhase = null;
    let svg, g, zoom;

    // ===== INIT =====
    function init() {
      const canvas = document.getElementById('canvas');
      svg = d3.select(canvas).append('svg')
        .attr('width', '100%')
        .attr('height', '100%');

      // Defs for arrowheads
      const defs = svg.append('defs');

      defs.append('marker')
        .attr('id', 'arrow-happy')

    // ===== LEVEL 2: FLOW =====
    function goToLevel2(phaseId) {
      currentLevel = 2;

    function renderLevel2(phase) {
      const nodes = phase.nodes;
      const edges = phase.edges;

      // Layout: position nodes
      const positions = computeLayout(nodes, edges);

      const showMinimap = nodes.length > 8;
      document.getElementById('minimap').style.display = showMinimap ? 'block' : 'none';

      // Draw edges first (behind nodes)
      edges.forEach((edge, i) => {
        const fromPos = positions[edge.from];
        const toPos = positions[edge.to];
        if (!fromPos || !toPos) return;

        const fromNode = nodes.find(n => n.id === edge.from);
        const toNode = nodes.find(n => n.id === edge.to);

        const path = computeEdgePath(fromPos, toPos, fromNode, toNode, edge, positions, edges);

        const isError = toNode && toNode.type === 'error';
        const markerUrl = edge.isHappyPath ? 'url(#arrow-happy)' : (isError ? 'url(#arrow-error)' : 'url(#arrow-normal)');

        g.append('path')
          .attr('d', path)
          .attr('stroke', edge.isHappyPath ? '#013D5B' : (isError ? '#F44336' : '#bbb'))
          .attr('stroke-width', edge.isHappyPath ? 3 : 1.5)
          .attr('fill', 'none')
          .attr('marker-end', markerUrl)
          .attr('stroke-dasharray', edge.isHappyPath ? 'none' : (isError ? '6,4' : 'none'))
          .attr('opacity', 0)
          .transition().duration(400).delay(100 + i * 50)
          .attr('opacity', edge.isHappyPath ? 1 : 0.7);

        // Edge label
        if (edge.label) {
          const mid = getPathMidpoint(fromPos, toPos);
          g.append('rect')
            .attr('x', mid.x - edge.label.length * 3.5 - 4)
            .attr('y', mid.y - 8)
            .attr('width', edge.label.length * 7 + 8)
            .attr('height', 16)
            .attr('rx', 3)
            .attr('fill', 'white')
            .attr('stroke', edge.isHappyPath ? '#013D5B' : (isError ? '#F44336' : '#ddd'))
            .attr('stroke-width', 0.5)
            .attr('opacity', 0)
            .transition().duration(400).delay(200 + i * 50)
            .attr('opacity', 1);

          g.append('text')
            .attr('x', mid.x)
            .attr('y', mid.y + 4)
            .attr('text-anchor', 'middle')
            .attr('fill', edge.isHappyPath ? '#013D5B' : (isError ? '#C62828' : '#888'))
            .attr('font-size', '10px')
            .attr('font-weight', edge.isHappyPath ? '600' : '400')
            .text(edge.label)
            .attr('opacity', 0)
            .transition().duration(400).delay(200 + i * 50)
            .attr('opacity', 1);
        }
      });

      // Draw nodes
      nodes.forEach((node, i) => {
        const pos = positions[node.id];
        if (!pos) return;

        const nodeG = g.append('g')
          .attr('transform', `translate(${pos.x}, ${pos.y})`)
          .attr('cursor', 'pointer')
          .attr('opacity', 0)
          .on('click', () => showDetail(node, phase))
          .on('mouseenter', function() {
            d3.select(this).select('.node-bg')
              .transition().duration(150)
              .attr('filter', 'url(#hover-shadow)');
            d3.select(this).transition().duration(150)
              .attr('transform', `translate(${pos.x}, ${pos.y}) scale(1.03)`);
          })
          .on('mouseleave', function() {
            d3.select(this).select('.node-bg')
              .transition().duration(150)
              .attr('filter', 'url(#drop-shadow)');
            d3.select(this).transition().duration(150)
              .attr('transform', `translate(${pos.x}, ${pos.y}) scale(1)`);
          });

        nodeG.transition().duration(400).delay(i * 60)
          .attr('opacity', 1);

        renderNode(nodeG, node, phase);
      });

      // Center view
      const allPositions = Object.values(positions);
      const minX = Math.min(...allPositions.map(p => p.x)) - 100;
      const maxX = Math.max(...allPositions.map(p => p.x)) + 250;
      const minY = Math.min(...allPositions.map(p => p.y)) - 60;
      const maxY = Math.max(...allPositions.map(p => p.y)) + 120;

      const svgEl = svg.node();
      const svgW = svgEl.clientWidth;
      const svgH = svgEl.clientHeight;
      const contentW = maxX - minX;
      const contentH = maxY - minY;
      const scale = Math.min(svgW / contentW, svgH / contentH, 1) * 0.85;
      const tx = (svgW - contentW * scale) / 2 - minX * scale;
      const ty = (svgH - contentH * scale) / 2 - minY * scale;

      svg.transition().duration(400).call(
        zoom.transform,
        d3.zoomIdentity.translate(tx, ty).scale(scale)
      );
    }

    function computeLayout(nodes, edges) {
      const positions = {};
      const nodeWidth = 180;
      const nodeHeight = 60;
      const hGap = 100;
      const vGap = 100;

      // Find start node or first node
      let startId = nodes[0].id;
      for (const n of nodes) {
        if (n.type === 'start') { startId = n.id; break; }
      }

      // BFS to determine positions
      const visited = new Set();
      const queue = [{ id: startId, col: 0, row: 0 }];
      visited.add(startId);

      // Track column usage
      const colRows = {};

      while (queue.length > 0) {
        const { id, col, row } = queue.shift();
        const nodeData = nodes.find(n => n.id === id);

        if (!colRows[col]) colRows[col] = 0;
        const actualRow = Math.max(row, colRows[col]);
        colRows[col] = actualRow + 1;

        positions[id] = {
          x: 100 + col * (nodeWidth + hGap),
          y: 80 + actualRow * (nodeHeight + vGap)
        };

        // Find outgoing edges
        const outgoing = edges.filter(e => e.from === id);
        // Sort: happy path first, then errors
        outgoing.sort((a, b) => {
          if (a.isHappyPath && !b.isHappyPath) return -1;
          if (!a.isHappyPath && b.isHappyPath) return 1;
          return 0;
        });

        outgoing.forEach((edge, idx) => {
          if (!visited.has(edge.to)) {
            visited.add(edge.to);
            const toNode = nodes.find(n => n.id === edge.to);
            if (toNode && (toNode.type === 'error')) {
              // Place errors below
              queue.push({ id: edge.to, col: col, row: actualRow + 1 });
            } else if (idx === 0) {
              // Happy path: next column, same row
              queue.push({ id: edge.to, col: col + 1, row: 0 });
            } else {
              // Alt path: next column, offset row
              queue.push({ id: edge.to, col: col + 1, row: 1 });
            }
          }
        });
      }

      // Place any unvisited nodes
      let extraCol = Object.keys(colRows).length;
      nodes.forEach(n => {
        if (!positions[n.id]) {
          positions[n.id] = { x: 100 + extraCol * (nodeWidth + hGap), y: 80 };
          extraCol++;
        }
      });

      return positions;
    }

    function computeEdgePath(fromPos, toPos, fromNode, toNode, edge, positions, edges) {
      const fw = fromNode && fromNode.type === 'decision' ? 70 : 90;
      const fh = fromNode && fromNode.type === 'decision' ? 35 : 28;
      const tw = toNode && toNode.type === 'decision' ? 70 : 90;
      const th = toNode && toNode.type === 'decision' ? 35 : 28;

      const fromCx = fromPos.x + fw;
      const fromCy = fromPos.y + fh;
      const toCx = toPos.x + tw;
      const toCy = toPos.y + th;

      const dx = toCx - fromCx;
      const dy = toCy - fromCy;

      // Simple routing
      if (Math.abs(dx) > Math.abs(dy)) {
        // Horizontal dominant
        const sx = dx > 0 ? fromCx + fw + 5 : fromCx - fw - 5;
        const ex = dx > 0 ? toCx - tw - 15 : toCx + tw + 15;
        if (Math.abs(dy) < 20) {
          return `M${sx},${fromCy} L${ex},${toCy}`;
        }
        const midX = (sx + ex) / 2;
        return `M${sx},${fromCy} C${midX},${fromCy} ${midX},${toCy} ${ex},${toCy}`;
      } else {
        // Vertical dominant
        const sy = dy > 0 ? fromCy + fh + 5 : fromCy - fh - 5;
        const ey = dy > 0 ? toCy - th - 15 : toCy + th + 15;
        if (Math.abs(dx) < 20) {
          return `M${fromCx},${sy} L${toCx},${ey}`;
        }
        const midY = (sy + ey) / 2;
        return `M${fromCx},${sy} C${fromCx},${midY} ${toCx},${midY} ${toCx},${ey}`;
      }
    }

    function getPathMidpoint(fromPos, toPos) {
      return {
        x: (fromPos.x + toPos.x) / 2 + 90,
        y: (fromPos.y + toPos.y) / 2 + 30
      };
    }

    // ===== LEVEL 3: DETAIL PANEL =====
    function showDetail(node, phase) {
      updateBreadcrumb(3, phase.label, node.label);

      const panel = document.getElementById('detail-panel');
      const overlay = document.getElementById('overlay');

      document.getElementById('detail-title').textContent = node.label;

      const badge = document.getElementById('detail-badge');

        error: { bg: '#FDECEA', color: '#C62828', text: 'Error State' },
        start: { bg: '#E8F5E9', color: '#2E7D32', text: 'Start' },
        end: { bg: '#E8F5E9', color: '#2E7D32', text: 'Success / End' },
        external: { bg: '#F5F5F5', color: '#666', text: 'External System' }
      };

      badge.textContent = `${style.text}${node.screenType ? ' \u00B7 ' + node.screenType : ''}`;
      badge.style.background = style.bg;
      badge.style.color = style.color;

        body += `<div class="panel-section">

        body += `<div class="panel-section">
          <div class="section-label">Description</div>
          <div class="section-content">${node.description}</div>
        </div>`;
      }

      if (node.edgeCases && node.edgeCases.length > 0) {
        body += `<div class="panel-section">
          <div class="section-label">Edge Cases</div>
          <div class="section-content">
            ${node.edgeCases.map(ec => `<div class="edge-case-item">${ec}</div>`).join('')}

      }

      if (node.exits && node.exits.length > 0) {
        body += `<div class="panel-section">
          <div class="section-label">Exits</div>
          <div class="section-content">
            ${node.exits.map(ex => `<div class="exit-item"><span class="exit-arrow">&rarr;</span> <strong>${ex.to}</strong> <span style="color:#999;margin-left:4px">${ex.label}</span></div>`).join('')}
          </div>
        </div>`;
      }

      document.getElementById('detail-body').innerHTML = body;

      panel.classList.add('open');
      overlay.classList.add('active');
    }

    function closeDetailPanel() {
      document.getElementById('detail-panel').classList.remove('open');
      document.getElementById('overlay').classList.remove('active');
      if (currentPhase) {
        const phase = flowData.phases.find(p => p.id === currentPhase);
        updateBreadcrumb(2, phase.label);
      }
    }

    // ===== NAVIGATION =====
    function goToLevel1() {
      closeDetailPanel();
      renderLevel1();
    }

    function goToLevel2(phaseId) {
      closeDetailPanel();
      if (currentLevel === 1 || currentPhase !== phaseId) {
        goToLevel2Internal(phaseId);
      }
    }

    function goToLevel2Internal(phaseId) {
      currentLevel = 2;
      currentPhase = phaseId;
      const phase = flowData.phases.find(p => p.id === phaseId);
      updateBreadcrumb(2, phase.label);
      document.getElementById('legend').style.display = 'block';

      g.selectAll('*')
        .transition().duration(200)
        .attr('opacity', 0);

      setTimeout(() => {
        g.selectAll('*').remove();
        renderLevel2(phase);
      }, 220);
    }

    // Alias for breadcrumb onclick
    window.goToLevel2 = function(phaseId) {
      closeDetailPanel();
      goToLevel2Internal(phaseId);
    };

    // ===== START =====
    init();
  </script>
</body>
</html>
